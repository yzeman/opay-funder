<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OPay - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
        }
        .dashboard-container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .header {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .header img { width: 80px; height: 80px; object-fit: contain; }
        .welcome-card {
            background: linear-gradient(135deg, #00B875, #009a62);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .welcome-name { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
        .welcome-account { font-size: 14px; opacity: 0.9; }
        .menu-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
        }
        .menu-card:active { transform: scale(0.98); background: #f8f9fa; }
        .menu-icon { width: 50px; height: 50px; background: #e8f5e9; border-radius: 25px; display: flex; align-items: center; justify-content: center; }
        .menu-icon i { font-size: 24px; color: #00B875; }
        .menu-info { flex: 1; }
        .menu-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .menu-desc { font-size: 12px; color: #888; }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            width: 100%;
            font-weight: 600;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <img src="images/ppay.png" alt="OPay Logo">
        </div>
        
        <div class="welcome-card" id="welcomeCard">
            <div class="welcome-name" id="userName">Loading...</div>
            <div class="welcome-account" id="userAccount">---</div>
            <div class="welcome-account" id="userEmail" style="font-size: 12px;">---</div>
        </div>
        
        <a href="#" class="menu-card" id="verifyAccountBtn">
            <div class="menu-icon"><i class="fas fa-check-circle"></i></div>
            <div class="menu-info">
                <div class="menu-title">Verify Account</div>
                <div class="menu-desc">Check any account name instantly</div>
            </div>
            <i class="fas fa-chevron-right" style="color: #ccc;"></i>
        </a>
        
        <a href="#" class="menu-card" id="transactionBtn">
            <div class="menu-icon"><i class="fas fa-history"></i></div>
            <div class="menu-info">
                <div class="menu-title">Transaction History</div>
                <div class="menu-desc">View your verification history</div>
            </div>
            <i class="fas fa-chevron-right" style="color: #ccc;"></i>
        </a>
        
        <a href="#" class="menu-card" id="profileBtn">
            <div class="menu-icon"><i class="fas fa-user"></i></div>
            <div class="menu-info">
                <div class="menu-title">My Profile</div>
                <div class="menu-desc">View your account details</div>
            </div>
            <i class="fas fa-chevron-right" style="color: #ccc;"></i>
        </a>
        
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    
    <script>
        // Load user data
        const userData = localStorage.getItem('loggedInUser');
        
        if (!userData) {
            window.location.href = 'login1.html';
        }
        
        const user = JSON.parse(userData);
        
        document.getElementById('userName').textContent = user.account_name;
        document.getElementById('userAccount').textContent = user.account_number;
        document.getElementById('userEmail').textContent = user.email;
        
        document.getElementById('verifyAccountBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'verify-account.html';
        });
        
        document.getElementById('transactionBtn').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Transaction history coming soon!');
        });
        
        document.getElementById('profileBtn').addEventListener('click', (e) => {
            e.preventDefault();
            Swal.fire({
                title: 'My Profile',
                html: `
                    <strong>Name:</strong> ${user.account_name}<br>
                    <strong>Account:</strong> ${user.account_number}<br>
                    <strong>Email:</strong> ${user.email}<br>
                    <strong>Status:</strong> Active
                `,
                confirmButtonColor: '#00B875',
                width: '300px'
            });
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('loggedInUser');
            window.location.href = 'login1.html';
        });
    </script>
</body>
</html>
