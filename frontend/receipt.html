<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OPay - Receipt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fc;
            padding: 20px;
            padding-bottom: 40px;
        }

        .receipt-container {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        /* Header */
        .receipt-header {
            background: white;
            padding: 16px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #333;
            padding: 5px;
            width: 40px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0;
            flex: 1;
        }

        /* Content */
        .receipt-content {
            padding: 20px;
        }

        .bank-logo-center {
            text-align: center;
            margin-bottom: 16px;
        }

        .bank-logo-center img {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            object-fit: cover;
        }

        .transfer-title {
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .transfer-amount {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .transfer-status {
            text-align: center;
            margin-bottom: 24px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-badge.success {
            background: #e8f5e9;
            color: #00B875;
        }

        .timeline-container {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .timeline-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .timeline-step {
            text-align: center;
            flex: 1;
        }

        .step-icon {
            width: 15px;
            height: 15px;
            background: #00B875;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
        }

        .step-icon i {
            font-size: 8px;
            color: white;
        }

        .step-label {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            margin-bottom: 4px;
        }

        .step-date {
            font-size: 10px;
            color: #888;
        }

        .timeline-arrow {
            color: #ddd;
            font-size: 14px;
            padding: 0 5px;
        }

        .info-message {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            font-size: 8px;
            color: #888;
            text-align: left;
        }

        .details-section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-top: 16px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-label {
            font-size: 12px;
            color: #888;
        }

        .detail-value {
            font-size: 11px;
            font-weight: 500;
            color: #1a1a1a;
            text-align: right;
            max-width: 60%;
        }

        .recipient-info {
            text-align: right;
        }

        .recipient-name {
            font-weight: 600;
            color: #1a1a1a;
        }

        .recipient-bank {
            font-size: 11px;
            color: #888;
        }

        .copy-icon {
            margin-left: 8px;
            color: #00B875;
            cursor: pointer;
            font-size: 12px;
        }

        .footer-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            padding-top: 16px;
            border-top: 1px solid #eee;
            margin-bottom: 20px;
        }

        .footer-btn {
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
        }

        .footer-btn.report {
            color: #dc3545;
            background: #fff5f5;
        }

        .footer-btn.share {
            color: #00B875;
            background: #e8f5e9;
        }
    </style>
</head>
<body>
    <div class="receipt-container" id="receiptContainer">
        <div class="receipt-header">
            <button class="back-btn" onclick="window.location.href='transaction.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="header-title">Transaction Details</h1>
            <div style="width: 40px;"></div>
        </div>
        <div class="receipt-content" id="receiptContent">
            <div class="loading">Loading receipt...</div>
        </div>
    </div>

    <script>
        // Helper function to copy to clipboard
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            Swal.fire({ icon: 'success', title: 'Copied!', text: 'Copied to clipboard', timer: 1500, showConfirmButton: false });
        }

        // Format date function
        function formatDateToMMDD(dateString) {
            const monthMap = {
                'January': '01', 'February': '02', 'March': '03', 'April': '04',
                'May': '05', 'June': '06', 'July': '07', 'August': '08',
                'September': '09', 'October': '10', 'November': '11', 'December': '12'
            };
            
            const parts = dateString.split(',');
            const datePart = parts[0].trim();
            const timePart = parts[1] ? parts[1].trim() : '';
            
            let monthNum = '';
            let dayNum = '';
            
            for (const month of Object.keys(monthMap)) {
                if (datePart.startsWith(month)) {
                    monthNum = monthMap[month];
                    dayNum = datePart.replace(month, '').replace(/th|st|nd|rd/g, '').trim();
                    break;
                }
            }
            
            if (dayNum.length === 1) dayNum = '0' + dayNum;
            
            return `${monthNum}-${dayNum} ${timePart}`;
        }

        // Generate Session ID
        function generateSessionId() {
            return '10000' + Date.now().toString() + Math.random().toString(36).substring(2, 15).toUpperCase();
        }

        // Load receipt data from URL parameters
        function loadReceipt() {
            const urlParams = new URLSearchParams(window.location.search);
            const receiptData = urlParams.get('data');
            
            if (!receiptData) {
                document.getElementById('receiptContent').innerHTML = '<div class="loading">No receipt data found</div>';
                return;
            }
            
            try {
                const tx = JSON.parse(decodeURIComponent(receiptData));
                renderReceipt(tx);
            } catch (error) {
                document.getElementById('receiptContent').innerHTML = '<div class="loading">Error loading receipt</div>';
            }
        }

        function renderReceipt(tx) {
            const statusText = tx.status === 'success' ? 'Successful' : tx.status === 'pending' ? 'Pending' : 'Failed';
            const statusClass = tx.status === 'success' ? 'success' : tx.status === 'pending' ? 'pending' : 'failed';
            
            const bankLogos = {
                'Polaris Bank Plc': 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Polaris_Bank_logo.svg/200px-Polaris_Bank_logo.svg.png',
                'OPay': 'https://opay-cdn.s3.us-east-2.amazonaws.com/opay-logo.png',
                'GTBank': 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Guaranty_Trust_Bank_logo.svg/200px-Guaranty_Trust_Bank_logo.svg.png',
                'First Bank': 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c6/First_Bank_of_Nigeria_logo.svg/200px-First_Bank_of_Nigeria_logo.svg.png',
                'UBA': 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/United_Bank_for_Africa_logo.svg/200px-United_Bank_for_Africa_logo.svg.png',
                'Zenith Bank': 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Zenith_Bank_logo.svg/200px-Zenith_Bank_logo.svg.png',
                'Access Bank': 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Access_Bank_logo.svg/200px-Access_Bank_logo.svg.png'
            };
            
            const bankLogo = bankLogos[tx.bank] || 'https://cdn-icons-png.flaticon.com/512/1108/1108564.png';
            
            const html = `
                <div class="bank-logo-center">
                    <img src="${bankLogo}" alt="${tx.bank}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1108/1108564.png'">
                </div>
                
                <div class="transfer-title">Transfer to ${tx.fromTo || 'Recipient'}</div>
                <div class="transfer-amount">₦${tx.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                <div class="transfer-status">
                    <span class="status-badge ${statusClass}">${statusText}</span>
                </div>
                
                <div class="timeline-container">
                    <div class="timeline-row">
                        <div class="timeline-step">
                            <div class="step-icon completed"><i class="fas fa-check"></i></div>
                            <div class="step-label">Payment successful</div>
                            <div class="step-date">${formatDateToMMDD(tx.date)}</div>
                        </div>
                        <div class="timeline-arrow"><i class="fas fa-arrow-right"></i></div>
                        <div class="timeline-step">
                            <div class="step-icon completed"><i class="fas fa-clock"></i></div>
                            <div class="step-label">Processing<br>by bank</div>
                            <div class="step-date">${formatDateToMMDD(tx.date)}</div>
                        </div>
                        <div class="timeline-arrow"><i class="fas fa-arrow-right"></i></div>
                        <div class="timeline-step">
                            <div class="step-icon completed"><i class="fas fa-check-circle"></i></div>
                            <div class="step-label">Received<br>by bank</div>
                            <div class="step-date">${tx.receivedDate ? formatDateToMMDD(tx.receivedDate) : formatDateToMMDD(tx.date)}</div>
                        </div>
                    </div>
                    <div class="info-message">
                        <i class="fas fa-info-circle"></i> The recipient account is expected to be credited within 5 minutes, subject to notification by the bank.
                    </div>
                </div>
                
                <div class="details-section">
                    <div class="section-title">Transaction Details</div>
                    
                    <div class="detail-row">
                        <span class="detail-label">Recipient Details</span>
                        <div class="detail-value recipient-info">
                            <div class="recipient-name">${tx.fromTo || 'Recipient Name'}</div>
                            <div class="recipient-bank">${tx.bank || 'Bank'} | ${tx.accountNumber || 'Account Number'}</div>
                        </div>
                    </div>
                    
                    <div class="detail-row">
                        <span class="detail-label">Transaction No.</span>
                        <span class="detail-value">
                            ${tx.ref}
                            <i class="fas fa-copy copy-icon" onclick="copyToClipboard('${tx.ref}')"></i>
                        </span>
                    </div>
                    
                    <div class="detail-row">
                        <span class="detail-label">Payment Method</span>
                        <span class="detail-value">${tx.paymentMethod || 'OWealth'} <i class="fas fa-chevron-right" style="font-size: 10px; margin-left: 4px; color: #00B875;"></i></span>
                    </div>
                    
                    <div class="detail-row">
                        <span class="detail-label">Transaction Date</span>
                        <span class="detail-value">${tx.date}</span>
                    </div>
                    
                    <div class="detail-row">
                        <span class="detail-label">Session ID</span>
                        <span class="detail-value">
                            ${tx.sessionId || generateSessionId()}
                            <i class="fas fa-copy copy-icon" onclick="copyToClipboard('${tx.sessionId || generateSessionId()}')"></i>
                        </span>
                    </div>
                </div>
                
                <div class="footer-buttons">
                    <button class="footer-btn report" id="reportIssueBtn"><i class="fas fa-flag"></i> Report Issue</button>
                    <button class="footer-btn share" id="shareReceiptBtn"><i class="fas fa-share-alt"></i> Share Receipt</button>
                </div>
            `;
            
            document.getElementById('receiptContent').innerHTML = html;
            
            document.getElementById('reportIssueBtn')?.addEventListener('click', () => {
                Swal.fire({ icon: 'info', title: 'Report Issue', text: 'Our support team will contact you shortly', confirmButtonColor: '#00B875' });
            });
            
            document.getElementById('shareReceiptBtn')?.addEventListener('click', () => {
                Swal.fire({ icon: 'success', title: 'Shared!', text: 'Receipt shared successfully', timer: 1500, showConfirmButton: false });
            });
        }

        loadReceipt();
    </script>
</body>
</html>
