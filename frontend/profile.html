<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OPay - My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fc;
            padding-bottom: 30px;
        }

        /* Header */
        .header {
            background: white;
            padding: 16px 16px 10px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #333;
            padding: 5px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0;
        }

        /* Profile Card */
        .profile-card {
            background: white;
            margin: 16px;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: #00B875;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }

        .profile-avatar span {
            font-size: 32px;
            font-weight: 600;
            color: white;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        /* Info Section */
        .info-section {
            background: white;
            margin: 0 16px 12px;
            border-radius: 16px;
            overflow: hidden;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 14px;
            color: #888;
            font-weight: 400;
        }

        .info-value {
            font-size: 14px;
            color: #1a1a1a;
            font-weight: 500;
            text-align: right;
            flex: 1;
            margin-left: 20px;
            word-break: break-word;
        }

        .upgrade-link {
            color: #00B875;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .upgrade-link i {
            font-size: 12px;
            margin-left: 4px;
        }

        .null-value {
            color: #999;
            font-style: italic;
        }

        /* Edit Button */
        .edit-profile-btn {
            background: #00B875;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            margin: 16px;
            width: calc(100% - 32px);
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-profile-btn:active {
            transform: scale(0.98);
            background: #009a62;
        }

        /* Logout Button */
        .logout-btn {
            background: white;
            color: #dc3545;
            border: 1px solid #dc3545;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            margin: 0 16px 30px;
            width: calc(100% - 32px);
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:active {
            transform: scale(0.98);
            background: #fff5f5;
        }

        /* Divider */
        .divider {
            height: 8px;
            background: #f0f2f5;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <button class="back-btn" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="header-title">My Profile</h1>
        </div>
    </div>

    <!-- Profile Card -->
    <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">
            <span id="avatarLetter">A</span>
        </div>
        <div class="profile-name" id="profileName">ALABA ISREAL OLAYINKA</div>
    </div>

    <!-- OPay Account Number -->
    <div class="info-section">
        <div class="info-row">
            <span class="info-label">OPay Account Number</span>
            <span class="info-value" id="accountNumber">9013104760</span>
        </div>
    </div>

    <!-- Account Tier / Plan -->
    <div class="info-section">
        <div class="info-row">
            <span class="info-label">Account Tier / Plan:</span>
            <span class="info-value">
                <span id="tierText">Upgrade to Tier 2</span>
                <a href="#" class="upgrade-link" id="upgradeLink">Upgrade <i class="fas fa-chevron-right"></i></a>
            </span>
        </div>
    </div>

    <div class="divider"></div>

    <!-- Personal Information -->
    <div class="info-section">
        <div class="info-row">
            <span class="info-label">Full Name</span>
            <span class="info-value" id="fullName">ALABA ISREAL OLAYINKA</span>
        </div>
        <div class="info-row">
            <span class="info-label">Mobile Number</span>
            <span class="info-value" id="mobileNumber">+2349013104760</span>
        </div>
        <div class="info-row">
            <span class="info-label">Nickname</span>
            <span class="info-value" id="nickname">ALABA ISREAL OLAYINKA</span>
        </div>
        <div class="info-row">
            <span class="info-label">Gender</span>
            <span class="info-value null-value" id="gender">null</span>
        </div>
        <div class="info-row">
            <span class="info-label">Date of Birth</span>
            <span class="info-value null-value" id="dob">null</span>
        </div>
        <div class="info-row">
            <span class="info-label">Email</span>
            <span class="info-value" id="email">olas@gmail.com</span>
        </div>
        <div class="info-row">
            <span class="info-label">Address</span>
            <span class="info-value null-value" id="address">null</span>
        </div>
    </div>

    <!-- Edit Profile Button -->
    <button class="edit-profile-btn" id="editProfileBtn">
        <i class="fas fa-edit"></i> Edit Profile
    </button>

    <!-- Logout Button -->
    <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>

    <script>
        const BACKEND_URL = 'https://opay-backend-api.onrender.com';
        
        // Load user data from localStorage
        const userData = localStorage.getItem('loggedInUser');
        if (!userData) {
            window.location.href = 'login1.html';
        }
        
        const user = JSON.parse(userData);
        
        // Get saved tier from localStorage
        let currentTier = localStorage.getItem(`user_tier_${user.email}`) || '1';
        
        // Update profile with user data
        function loadProfile() {
            // Profile name
            const fullName = user.account_name;
            document.getElementById('profileName').innerText = fullName;
            document.getElementById('fullName').innerText = fullName;
            document.getElementById('nickname').innerText = fullName;
            
            // Avatar letter
            const firstLetter = fullName.charAt(0).toUpperCase();
            document.getElementById('avatarLetter').innerText = firstLetter;
            
            // Account number
            const accountNumber = user.account_number;
            document.getElementById('accountNumber').innerText = accountNumber;
            document.getElementById('mobileNumber').innerText = `+234${accountNumber}`;
            
            // Email
            document.getElementById('email').innerText = user.email;
            
            // Update tier display
            updateTierDisplay();
        }
        
        function updateTierDisplay() {
            const tierTextSpan = document.getElementById('tierText');
            const upgradeLink = document.getElementById('upgradeLink');
            
            if (currentTier === '1' || currentTier === 1) {
                tierTextSpan.innerText = '⭐ Tier 1 (Free)';
                upgradeLink.style.display = 'inline-flex';
            } else if (currentTier === '2' || currentTier === 2) {
                tierTextSpan.innerText = '🥈 Tier 2 (Basic)';
                upgradeLink.style.display = 'inline-flex';
            } else if (currentTier === '3' || currentTier === 3) {
                tierTextSpan.innerText = '🥉 Tier 3 (Premium)';
                upgradeLink.style.display = 'inline-flex';
            } else if (currentTier === 'VIP') {
                tierTextSpan.innerText = '👑 VIP Tier';
                upgradeLink.style.display = 'none';
            }
        }
        
        // Upgrade button click - show activation sheet
        function showUpgradeSheet() {
            const existingOverlay = document.getElementById('upgradeOverlay');
            if (existingOverlay) existingOverlay.remove();
            
            const overlay = document.createElement('div');
            overlay.id = 'upgradeOverlay';
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 2000;
                display: flex;
                align-items: flex-end;
                animation: fadeIn 0.3s ease;
            `;
            
            overlay.innerHTML = `
                <div style="
                    background: white;
                    width: 100%;
                    border-radius: 28px 28px 0 0;
                    animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
                    max-height: 85vh;
                    overflow-y: auto;
                ">
                    <div style="text-align: center; padding: 20px 20px 10px;">
                        <div style="width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px;"></div>
                        <div style="font-size: 22px; font-weight: 700; color: #1a1a1a;">Upgrade Your Plan</div>
                        <div style="font-size: 13px; color: #888; margin-top: 6px;">Choose a plan to unlock more features</div>
                    </div>
                    
                    <div style="margin: 0 16px 12px; background: #f0f2f5; border-radius: 12px; padding: 10px; text-align: center;">
                        <span style="font-size: 12px; color: #666;">Your Current Tier: </span>
                        <span style="font-size: 14px; font-weight: 700; color: #00B875;">
                            ${currentTier === '1' || currentTier === 1 ? '⭐ Tier 1 (Free)' : 
                              currentTier === '2' || currentTier === 2 ? '🥈 Tier 2 (Basic)' : 
                              currentTier === '3' || currentTier === 3 ? '🥉 Tier 3 (Premium)' : '👑 VIP Tier'}
                        </span>
                    </div>
                    
                    <!-- Basic Plan (Tier 2) -->
                    <div style="margin: 12px 16px; background: ${currentTier >= 2 ? '#e8f5e9' : 'white'}; border-radius: 20px; padding: 16px; border: 1px solid ${currentTier >= 2 ? '#00B875' : '#eee'};">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="font-size: 28px;">🥈</span>
                                <div>
                                    <div style="font-size: 18px; font-weight: 700;">Basic Plan</div>
                                    <div style="font-size: 11px; color: #888;">Upgrade to Tier 2</div>
                                </div>
                            </div>
                            <div style="font-size: 22px; font-weight: 700; color: #00B875;">₦30,000</div>
                        </div>
                        <div style="font-size: 12px; color: #555; margin-bottom: 12px;">
                            • Transfer to OPay only<br>
                            • Add money unlock<br>                            
                            • View receipt<br>
                            • payment proof - no watermark added<br>
                            • Activate banner removed<br>
                            • 10 times transfer daily<br>
                            • Add Money limit ₦100,000
                        </div>
                        <button class="plan-purchase-btn" data-plan="basic" data-tier="2" style="width: 100%; padding: 12px; background: #00B875; color: white; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; opacity: ${currentTier >= 2 ? '0.6' : '1'};" ${currentTier >= 2 ? 'disabled' : ''}>
                            ${currentTier >= 2 ? '✓ Already Purchased' : 'Upgrade to Basic >'}
                        </button>
                    </div>
                    
                    <!-- Premium Plan (Tier 3) -->
                    <div style="margin: 12px 16px; background: ${currentTier >= 3 ? '#e8f5e9' : 'white'}; border-radius: 20px; padding: 16px; border: 1px solid ${currentTier >= 3 ? '#00B875' : '#eee'};">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="font-size: 28px;">🥉</span>
                                <div>
                                    <div style="font-size: 18px; font-weight: 700;">Premium Plan</div>
                                    <div style="font-size: 11px; color: #888;">Upgrade to Tier 3</div>
                                </div>
                            </div>
                            <div style="font-size: 22px; font-weight: 700; color: #00B875;">₦50,000</div>
                        </div>
                        <div style="font-size: 12px; color: #555; margin-bottom: 12px;">
                            Everything in Basic plus:<br>
                            • History access, recent recipients history<br>
                            • OPay and bank transfer<br>
                            • Custom sender name<br>
                            • Custom transaction status (failed, success, pending)<br>
                            • Unlimited transfer<br>
                            • Add Money limit ₦1,000,000
                        </div>
                        <button class="plan-purchase-btn" data-plan="premium" data-tier="3" style="width: 100%; padding: 12px; background: #00B875; color: white; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; opacity: ${currentTier >= 3 ? '0.6' : '1'};" ${currentTier >= 3 ? 'disabled' : ''}>
                            ${currentTier >= 3 ? '✓ Already Purchased' : 'Upgrade to Premium >'}
                        </button>
                    </div>
                    
                    <!-- VIP Plan -->
                    <div style="margin: 12px 16px; background: ${currentTier === 'VIP' ? '#e8f5e9' : 'white'}; border-radius: 20px; padding: 16px; border: 2px solid ${currentTier === 'VIP' ? '#FF6B35' : '#FFD700'};">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="font-size: 28px;">👑</span>
                                <div>
                                    <div style="font-size: 18px; font-weight: 700; color: #FF6B35;">VIP Plan</div>
                                    <div style="font-size: 11px; color: #888;">Upgrade to VIP Tier</div>
                                </div>
                            </div>
                            <div style="font-size: 22px; font-weight: 700; color: #FF6B35;">₦100,000</div>
                        </div>
                        <div style="font-size: 12px; color: #555; margin-bottom: 12px;">
                            Everything in Basic and Premium plus:<br>
                            • OPay Funder in-app transfers<br>
                            • Statement of account generation<br>
                            • Receivers receive alert<br>
                            • Money add up to receiver balance<br>
                            • Expire in user balance after 24hrs<br>
                            • Airtime access purchase<br>
                            • Data access purchase<br>
                            • Add money unlimited<br>
                            • No transaction limit
                        </div>
                        <button class="plan-purchase-btn" data-plan="vip" data-tier="VIP" style="width: 100%; padding: 12px; background: #FF6B35; color: white; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; opacity: ${currentTier === 'VIP' ? '0.6' : '1'};" ${currentTier === 'VIP' ? 'disabled' : ''}>
                            ${currentTier === 'VIP' ? '✓ Already Purchased' : 'Upgrade to VIP >'}
                        </button>
                    </div>
                    
                    <div style="padding: 16px 20px 30px;">
                        <button id="closeUpgradeSheet" style="width: 100%; padding: 14px; background: #f0f2f5; border: none; border-radius: 30px; font-size: 15px; font-weight: 600; color: #666; cursor: pointer;">Close</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            document.body.style.overflow = 'hidden';
            
            if (!document.getElementById('upgradeSheetStyles')) {
                const style = document.createElement('style');
                style.id = 'upgradeSheetStyles';
                style.textContent = `
                    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
                `;
                document.head.appendChild(style);
            }
            
            document.getElementById('closeUpgradeSheet')?.addEventListener('click', () => {
                overlay.remove();
                document.body.style.overflow = '';
            });
            
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.remove();
                    document.body.style.overflow = '';
                }
            });
            
            // Purchase buttons
            document.querySelectorAll('.plan-purchase-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (btn.disabled) return;
                    
                    const plan = btn.getAttribute('data-plan');
                    const tier = btn.getAttribute('data-tier');
                    
                    localStorage.setItem('selected_plan', JSON.stringify({
                        plan: plan,
                        tier: tier,
                        price: plan === 'basic' ? 30000 : (plan === 'premium' ? 50000 : 100000)
                    }));
                    
                    window.location.href = 'plan.html';
                });
            });
        }
        
        // Upgrade link click
        document.getElementById('upgradeLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            showUpgradeSheet();
        });
        
        // Edit Profile button
        document.getElementById('editProfileBtn')?.addEventListener('click', () => {
            Swal.fire({
                title: 'Edit Profile',
                text: 'Profile editing feature coming soon!',
                icon: 'info',
                confirmButtonColor: '#00B875'
            });
        });
        
        // Logout button
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            Swal.fire({
                title: 'Logout',
                text: 'Are you sure you want to logout?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                cancelButtonColor: '#888',
                confirmButtonText: 'Yes, Logout',
                cancelButtonText: 'Cancel'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('loggedInUser');
                    window.location.href = 'login1.html';
                }
            });
        });
        
        // Load profile
        loadProfile();
        
        console.log('✅ Profile page loaded');
    </script>
</body>
</html>
