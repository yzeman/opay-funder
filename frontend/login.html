<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OPay - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', Helvetica, Arial, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Main Container - No card, just content */
        .login-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        /* OPay Logo */
        .opay-logo {
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .logo-icon img {
            width: 140px;
            height: 140px;
            object-fit: contain;
        }

        /* Heading Section */
        .heading-section {
            margin-bottom: 20px;
        }

        .instant-text {
            font-size: 18px;
            font-weight: 600;
            color: #00B875;
            line-height: 1.2;
        }

        .instant-text span {
            color: #000000;
        }

        /* Login Image */
        .login-image {
            margin: 20px 0;
        }

        .login-image img {
            width: 2000px;
            height: auto;
            max-width: 100%;
        }

        /* Bill Payment Section */
        .bill-payment {
            margin: 15px 0;
        }

        .bill-payment p {
            font-size: 10px;
            font-weight: 500;
            color: #333333;
        }

        /* Create Account Button */
        .create-account-btn {
            background: transparent;
            color: #00B875;
            border: 2px solid #00B875;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            max-width: 280px;
            cursor: pointer;
            margin: 10px auto;
            transition: all 0.3s ease;
            display: block;
        }

        .create-account-btn:hover {
            background: #00B875;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 184, 117, 0.3);
        }

        .create-account-btn:active {
            transform: translateY(0);
        }

        /* Login Button */
        .login-btn {
            background: #00B875;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            max-width: 280px;
            cursor: pointer;
            margin: 10px auto 20px auto;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 184, 117, 0.3);
            display: block;
        }

        .login-btn:hover {
            background: #00a066;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 184, 117, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Auto-login indicator */
        .auto-login-message {
            margin-top: 20px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 12px;
            font-size: 12px;
            color: #00B875;
            display: none;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container {
            animation: fadeInUp 0.6s ease;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .instant-text {
                font-size: 15px;
            }
            
            .logo-icon img {
                width: 120px;
                height: 120px;
            }
            
            .login-image img {
                width: 100%;
                max-width: 550px;
            }
            
            .login-btn, .create-account-btn {
                max-width: 260px;
                padding: 12px 28px;
                font-size: 17px;
            }
            
            .opay-logo {
                margin-top: 10px;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- OPay Logo -->
        <div class="opay-logo">
            <div class="logo-icon">
                <img src="images/ppay.png" alt="OPay Logo">
            </div>
        </div>
        
        <!-- Instant and Free Transfer Text -->
        <div class="heading-section">
            <div class="instant-text">
                Instant and Free <span>Transfer</span>
            </div>
        </div>
        
        <!-- Login Image -->
        <div class="login-image">
            <img src="images/loginimg1.png" alt="Login Illustration">
        </div>
        
        <!-- Bill Payment -->
        <div class="bill-payment">
            <p>Bill Payment</p>
        </div>
        
        <!-- Create Account Button -->
        <button class="create-account-btn" id="createAccountBtn" style="display: none;">
            Create a new account
        </button>
        
        <!-- Login Button -->
        <button class="login-btn" id="loginBtn" style="display: none;">
            Login
        </button>
        
        <!-- Auto-login message -->
        <div id="autoLoginMessage" class="auto-login-message">
            <i class="fas fa-spinner fa-spin"></i> Auto-login in progress...
        </div>
    </div>

    <script>
        // Get elements
        const loginBtn = document.getElementById('loginBtn');
        const createAccountBtn = document.getElementById('createAccountBtn');
        const autoLoginMessage = document.getElementById('autoLoginMessage');
        
        // Check if user has an account (from localStorage that persists after logout)
        function hasUserAccount() {
            // Check for persistent account flag that doesn't get cleared on logout
            const hasRegistered = localStorage.getItem('opay_has_account');
            
            if (hasRegistered === 'true') {
                return true;
            }
            
            // Also check for existing users in database (via backend)
            // For now, check if there are any saved users
            const users = localStorage.getItem('opayUsers');
            if (users) {
                const parsedUsers = JSON.parse(users);
                if (parsedUsers && parsedUsers.length > 0) {
                    // Set the persistent flag for future
                    localStorage.setItem('opay_has_account', 'true');
                    return true;
                }
            }
            
            return false;
        }
        
        // Check if user is currently logged in
        function isUserLoggedIn() {
            const loggedInUser = localStorage.getItem('loggedInUser');
            return loggedInUser !== null;
        }
        
        // Auto-login to dashboard
        function autoLoginToDashboard() {
            autoLoginMessage.style.display = 'block';
            autoLoginMessage.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Welcome back! Redirecting to dashboard...';
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
        
        // Show appropriate button based on account status
        function showAppropriateButton() {
            const userLoggedIn = isUserLoggedIn();
            
            // If user is already logged in, auto-login to dashboard
            if (userLoggedIn) {
                autoLoginToDashboard();
                return;
            }
            
            // Check if user has an account (persistent check)
            const userHasAccount = hasUserAccount();
            
            // If user has an account, show login button
            if (userHasAccount) {
                loginBtn.style.display = 'block';
                createAccountBtn.style.display = 'none';
                console.log('✓ User has account - showing Login button');
            } else {
                // No account found, show create account button
                loginBtn.style.display = 'none';
                createAccountBtn.style.display = 'block';
                console.log('✓ No account found - showing Create Account button');
            }
        }
        
        // When user successfully creates an account, set the persistent flag
        // This function should be called from create.html after successful registration
        window.setUserHasAccount = function() {
            localStorage.setItem('opay_has_account', 'true');
        };
        
        // Login button click handler
        loginBtn.addEventListener('click', function(e) {
            this.style.transform = 'scale(0.97)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
            
            const originalText = this.innerHTML;
            this.innerHTML = '<div class="spinner"></div> Logging in...';
            this.disabled = true;
            
            setTimeout(() => {
                window.location.href = 'login1.html';
            }, 1000);
        });
        
        // Create account button click handler
        createAccountBtn.addEventListener('click', function(e) {
            this.style.transform = 'scale(0.97)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
            
            const originalText = this.innerHTML;
            this.innerHTML = '<div class="spinner"></div> Redirecting...';
            this.disabled = true;
            
            setTimeout(() => {
                window.location.href = 'create.html';
            }, 500);
        });
        
        // Hover effects
        loginBtn.addEventListener('mouseenter', function() {
            this.style.opacity = '0.95';
        });
        
        loginBtn.addEventListener('mouseleave', function() {
            this.style.opacity = '1';
        });
        
        createAccountBtn.addEventListener('mouseenter', function() {
            this.style.opacity = '0.95';
        });
        
        createAccountBtn.addEventListener('mouseleave', function() {
            this.style.opacity = '1';
        });

        // ============ UPDATE LAST SEEN ON USER ACTIVITY ==========
async function updateLastSeen() {
    const userData = localStorage.getItem('loggedInUser');
    if (!userData) return;
    
    const user = JSON.parse(userData);
    
    try {
        await fetch(`${BACKEND_URL}/api/update-last-seen`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: user.email })
        });
        console.log('✅ Last seen updated');
    } catch (error) {
        // Silently fail - doesn't affect user experience
    }
}

// Update on page load
updateLastSeen();

// Update every 5 minutes
setInterval(() => {
    updateLastSeen();
}, 5 * 60 * 1000);

// Update when user is active
let lastActivityTime = Date.now();
document.addEventListener('click', () => {
    const now = Date.now();
    if (now - lastActivityTime > 60 * 1000) { // If inactive for 1 minute
        updateLastSeen();
        lastActivityTime = now;
    }
});

document.addEventListener('scroll', () => {
    const now = Date.now();
    if (now - lastActivityTime > 60 * 1000) {
        updateLastSeen();
        lastActivityTime = now;
    }
});
        
        // Initialize page
        window.addEventListener('load', function() {
            showAppropriateButton();
            console.log('✓ OPay Login Page - Smart button display active');
        });
    </script>
</body>
</html>
