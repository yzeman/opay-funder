<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OPay - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', Helvetica, Arial, sans-serif;
            background: white;
            min-height: 100vh;
            padding: 40px 24px;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* OPay Logo */
        .logo-section {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: #00B875;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon span {
            color: white;
            font-size: 20px;
            font-weight: 700;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
        }

        /* Main Heading */
        .main-heading {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        /* Instant Transfer Section */
        .transfer-section {
            margin-bottom: 40px;
        }

        .instant-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .free-text {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .bill-payment {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-top: 20px;
        }

        /* Create Account Link */
        .create-account {
            margin: 30px 0;
        }

        .create-link {
            font-size: 16px;
            color: #00B875;
            font-weight: 600;
            text-decoration: none;
        }

        /* Login Button */
        .login-btn {
            background: #00B875;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .login-btn:hover {
            background: #00a063;
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            body {
                padding: 30px 20px;
            }
            
            .main-heading {
                font-size: 28px;
            }
            
            .instant-title {
                font-size: 16px;
            }
            
            .bill-payment {
                font-size: 16px;
            }
            
            .free-text {
                font-size: 13px;
            }
            
            .logo-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Logo Section -->
    <div class="logo-section">
        <div class="logo-icon">
            <span>O</span>
        </div>
        <div class="logo-text">OPay</div>
    </div>

    <!-- Main Heading -->
    <h1 class="main-heading">Instant and Free Transfer</h1>

    <!-- Transfer Info -->
    <div class="transfer-section">
        <div class="instant-title">Enjoy OPay to OPay transfer</div>
        <div class="free-text">
            & up to 90 Free transfers monthly to other banks
        </div>
        
        <div class="bill-payment">Bill Payment</div>
    </div>

    <!-- Create Account Link -->
    <div class="create-account">
        <a href="#" class="create-link">Create a new account</a>
    </div>

    <!-- Login Button -->
    <button class="login-btn" id="loginBtn">
        Login with your OPay number →
    </button>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        
        // Login button click handler
        loginBtn.addEventListener('click', function(e) {
            // Button press animation
            this.style.transform = 'scale(0.98)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
            
            // Show loading state
            const originalText = this.innerHTML;
            this.innerHTML = '⏳ Loading...';
            this.disabled = true;
            
            // Redirect to login1.html
            setTimeout(() => {
                window.location.href = 'login1.html';
            }, 500);
        });
        
        // Hover effect
        loginBtn.addEventListener('mouseenter', function() {
            this.style.opacity = '0.95';
        });
        
        loginBtn.addEventListener('mouseleave', function() {
            this.style.opacity = '1';
        });
        
        // Create account link handler
        document.querySelector('.create-link').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Create new account feature coming soon!');
        });
        
        console.log('✓ OPay Login Page Loaded');
    </script>
</body>
</html>
