<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OPay - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', Helvetica, Arial, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Main Container - No card, just content */
        .login-container {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        /* OPay Logo */
        .opay-logo {
            margin-top: 40px;
        }

        

        .logo-icon img {
            width: 75px;
            height: 75px;
            object-fit: contain;
        }

        /* Heading Section */
        .heading-section {
            margin-bottom: 30px;
        }

        .instant-text {
            font-size: 24px;
            font-weight: 600;
            color: #00B875;
            line-height: 1.2;
        }

        .instant-text span {
            color: #000000;
        }

        .free-transfer {
            font-size: 16px;
            color: #666666;
            margin-top: 10px;
            line-height: 1.5;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Login Image */
        .login-image {
            margin: 30px 0;
        }

        .login-image img {
            width: 200px;
            height: auto;
            max-width: 100%;
        }

        /* Bill Payment Section */
        .bill-payment {
            margin: 25px 0;
        }

        .bill-payment p {
            font-size: 10px;
            font-weight: 500;
            color: #333333;
        }

        /* Login Button */
        .login-btn {
            background: #00B875;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            max-width: 280px;
            cursor: pointer;
            margin: 20px auto;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 184, 117, 0.3);
            display: block;
        }

        .login-btn:hover {
            background: #00a066;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 184, 117, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Login with OPay Number Text */
        .login-hint {
            margin-top: 20px;
            color: #999999;
            font-size: 14px;
        }

        /* Create Account Link */
        .create-account {
            margin-top: 30px;
            padding-top: 20px;
        }

        .create-account p {
            color: #666666;
            font-size: 14px;
        }

        .create-account a {
            color: #00B875;
            text-decoration: none;
            font-weight: 600;
        }

        .create-account a:hover {
            text-decoration: underline;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
        }

        .divider-line {
            width: 60px;
            height: 1px;
            background: #e0e0e0;
        }

        .divider-text {
            color: #999;
            font-size: 12px;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container {
            animation: fadeInUp 0.6s ease;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .instant-text {
                font-size: 15px;
            }
            
            .free-transfer {
                font-size: 14px;
            }
            
            .logo-icon {
                width: 70px;
                height: 70px;
            }
            
            .logo-icon img {
                width: 58px;
                height: 58px;
            }
            
            .login-image img {
                width: 100%;
            }
            
            .login-btn {
                max-width: 240px;
                padding: 12px 24px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- OPay Logo -->
        <div class="opay-logo">
            <div class="logo-icon">
                <img src="images/ppay.png" alt="OPay Logo">
            </div>
        </div>
        
        <!-- Instant and Free Transfer Text -->
        <div class="heading-section">
            <div class="instant-text">
                Instant and Free <span>Transfer</span>
            </div>
            
        </div>
        
        <!-- Login Image -->
        <div class="login-image">
            <img src="images/loginimg1.png" alt="Login Illustration">
        </div>
        
        <!-- Bill Payment -->
        <div class="bill-payment">
            <p>Bill Payment</p>
        </div>
        
        <!-- Login Button -->
        <button class="login-btn" id="loginBtn">
            Login
        </button>
        
        

    <script>
        // Get elements
        const loginBtn = document.getElementById('loginBtn');
        const createAccountLink = document.getElementById('createAccountLink');
        
        // Login button click handler
        loginBtn.addEventListener('click', function(e) {
            // Button press animation
            this.style.transform = 'scale(0.97)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
            
            // Show loading state
            const originalText = this.innerHTML;
            this.innerHTML = '<div class="spinner"></div> Logging in...';
            this.disabled = true;
            
            // Simulate login process
            setTimeout(() => {
                // Redirect to account lookup/verification page (will create next)
                window.location.href = 'verify-account.html';
            }, 1000);
        });
        
        // Create account link handler
        createAccountLink.addEventListener('click', function(e) {
            e.preventDefault();
            
            // Animate link
            this.style.opacity = '0.7';
            setTimeout(() => {
                this.style.opacity = '1';
            }, 200);
            
            // Show info (registration page coming soon)
            alert('📝 Create Account\n\nAccount registration page coming soon!\n\nFor now, you can proceed to verify account names.');
            
            console.log('Create account clicked - Will implement registration page next');
        });
        
        // Hover effects for login button
        loginBtn.addEventListener('mouseenter', function() {
            this.style.opacity = '0.95';
        });
        
        loginBtn.addEventListener('mouseleave', function() {
            this.style.opacity = '1';
        });
        
        // Log successful load
        window.addEventListener('load', function() {
            console.log('✓ OPay Login Page Loaded Successfully');
            console.log('✓ Background: White');
            console.log('✓ Elements: Logo, Instant & Free Transfer text, Login image, Bill Payment, Login button');
            console.log('✓ Next: Verify Account page with bank API');
        });
    </script>
</body>
</html>
