<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OPay - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', Helvetica, Arial, sans-serif;
            background: white;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Main Container - No card, just content */
        .login-container {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            padding-bottom: 30px;
        }

        /* OPay Logo - SMALLER */
        .opay-logo {
            margin-bottom: 10px;
        }

        .logo-icon img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        /* Heading Section */
        .heading-section {
            margin-bottom: 10px;
        }

        .instant-text {
            font-size: 22px;
            font-weight: 600;
            color: #00B875;
            line-height: 1.2;
        }

        .instant-text span {
            color: #000000;
        }

        .free-transfer {
            font-size: 14px;
            color: #666666;
            margin-top: 8px;
            line-height: 1.4;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Login Image - SMALLER */
        .login-image {
            margin: 10px 0;
        }

        .login-image img {
            width: 220px;
            height: auto;
            max-width: 100%;
        }

        /* Bill Payment Section */
        .bill-payment {
            margin: 8px 0;
        }

        .bill-payment p {
            font-size: 10px;
            font-weight: 500;
            color: #333333;
        }

        /* Create Account Button */
        .create-account-btn {
            background: transparent;
            color: #00B875;
            border: 2px solid #00B875;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            max-width: 240px;
            cursor: pointer;
            margin: 8px auto;
            transition: all 0.3s ease;
            display: block;
        }

        .create-account-btn:hover {
            background: #00B875;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 184, 117, 0.3);
        }

        .create-account-btn:active {
            transform: translateY(0);
        }

        /* Login Button */
        .login-btn {
            background: #00B875;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            max-width: 240px;
            cursor: pointer;
            margin: 8px auto;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 184, 117, 0.3);
            display: block;
        }

        .login-btn:hover {
            background: #00a066;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 184, 117, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container {
            animation: fadeInUp 0.6s ease;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }
            
            .instant-text {
                font-size: 18px;
            }
            
            .logo-icon img {
                width: 80px;
                height: 80px;
            }
            
            .login-image img {
                width: 180px;
            }
            
            .login-btn, .create-account-btn {
                max-width: 220px;
                padding: 10px 24px;
                font-size: 15px;
            }
            
            .login-container {
                padding-top: 10px;
            }
        }

        /* For very short screens */
        @media (max-height: 650px) {
            .logo-icon img {
                width: 70px;
                height: 70px;
            }
            
            .login-image img {
                width: 150px;
            }
            
            .instant-text {
                font-size: 16px;
            }
            
            .login-container {
                padding-top: 5px;
            }
            
            .opay-logo {
                margin-bottom: 5px;
            }
            
            .login-image {
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- OPay Logo -->
        <div class="opay-logo">
            <div class="logo-icon">
                <img src="images/ppay.png" alt="OPay Logo">
            </div>
        </div>
        
        <!-- Instant and Free Transfer Text -->
        <div class="heading-section">
            <div class="instant-text">
                Instant and Free <span>Transfer</span>
            </div>
        </div>
        
        <!-- Login Image -->
        <div class="login-image">
            <img src="images/loginimg1.png" alt="Login Illustration">
        </div>
        
        <!-- Bill Payment -->
        <div class="bill-payment">
            <p>Bill Payment</p>
        </div>
        
        <!-- Create Account Button -->
        <button class="create-account-btn" id="createAccountBtn">
            Create a new account
        </button>
        
        <!-- Login Button -->
        <button class="login-btn" id="loginBtn">
            Login
        </button>
    </div>

    <script>
        // Get elements
        const loginBtn = document.getElementById('loginBtn');
        const createAccountBtn = document.getElementById('createAccountBtn');
        
        // Login button click handler - DIRECTS TO login1.html
        loginBtn.addEventListener('click', function(e) {
            // Button press animation
            this.style.transform = 'scale(0.97)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
            
            // Show loading state
            const originalText = this.innerHTML;
            this.innerHTML = '<div class="spinner"></div> Logging in...';
            this.disabled = true;
            
            // Redirect to login1.html
            setTimeout(() => {
                window.location.href = 'login1.html';
            }, 1000);
        });
        
        // Create account button handler - DIRECTS TO create.html
        createAccountBtn.addEventListener('click', function(e) {
            // Button press animation
            this.style.transform = 'scale(0.97)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
            
            // Show loading state
            const originalText = this.innerHTML;
            this.innerHTML = '<div class="spinner"></div> Redirecting...';
            this.disabled = true;
            
            // Redirect to create.html
            setTimeout(() => {
                window.location.href = 'create.html';
            }, 500);
        });
        
        // Hover effects for login button
        loginBtn.addEventListener('mouseenter', function() {
            this.style.opacity = '0.95';
        });
        
        loginBtn.addEventListener('mouseleave', function() {
            this.style.opacity = '1';
        });
        
        // Hover effects for create account button
        createAccountBtn.addEventListener('mouseenter', function() {
            this.style.opacity = '0.95';
        });
        
        createAccountBtn.addEventListener('mouseleave', function() {
            this.style.opacity = '1';
        });
        
        // Log successful load
        window.addEventListener('load', function() {
            console.log('✓ OPay Login Page Loaded Successfully');
            console.log('✓ Content shifted up - Login button visible');
            console.log('✓ All elements resized to fit screen');
        });
    </script>
</body>
</html>
