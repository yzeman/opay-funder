<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OPay Admin - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .login-container { max-width: 400px; margin: 100px auto; }
        .stats-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stats-number { font-size: 32px; font-weight: 700; color: #00B875; }
        .user-table { background: white; border-radius: 16px; padding: 20px; overflow-x: auto; }
        table { width: 100%; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .copy-btn, .delete-btn { border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; margin: 2px; }
        .copy-btn { background: #00B875; color: white; }
        .delete-btn { background: #dc3545; color: white; }
        .delete-btn:hover { background: #c82333; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 8px; margin-bottom: 20px; }
        .status-active { color: #00B875; font-weight: 600; }
        .status-inactive { color: #dc3545; font-weight: 600; }
        .search-box { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 300px; }
        .bulk-delete-btn { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-left: 10px; }
        .select-all-checkbox { margin-right: 5px; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .refresh-btn { background: #00B875; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-left: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="loginScreen" style="display: none;">
            <div class="login-container">
                <div class="stats-card" style="text-align: center;">
                    <i class="fas fa-shield-alt" style="font-size: 48px; color: #00B875; margin-bottom: 20px;"></i>
                    <h2>Admin Login</h2>
                    <input type="password" id="adminPassword" class="form-control" placeholder="Enter Admin Password" style="margin: 20px 0;">
                    <button class="btn btn-success w-100" onclick="adminLogin()">Login</button>
                </div>
            </div>
        </div>
        
        <!-- Dashboard Screen -->
        <div id="dashboardScreen" style="display: none;">
            <div class="admin-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                    <h2><i class="fas fa-chart-line"></i> OPay Admin Dashboard</h2>
                    <div>
                        <button class="refresh-btn" onclick="loadDashboardData()"><i class="fas fa-sync-alt"></i> Refresh</button>
                        <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </div>
                </div>
                
                <!-- Stats Cards -->
                <div class="row" id="statsCards">
                    <div class="col-md-3">
                        <div class="stats-card">
                            <i class="fas fa-users"></i>
                            <div class="stats-number" id="totalUsers">0</div>
                            <div>Total Users</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stats-card">
                            <i class="fas fa-check-circle"></i>
                            <div class="stats-number" id="activeUsers">0</div>
                            <div>Active Users</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stats-card">
                            <i class="fas fa-clock"></i>
                            <div class="stats-number" id="inactiveUsers">0</div>
                            <div>Pending Activation</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stats-card">
                            <i class="fas fa-database"></i>
                            <div class="stats-number" id="dbSize">0</div>
                            <div>Database Size</div>
                        </div>
                    </div>
                </div>
                
                <!-- Search and Bulk Actions -->
                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search by name, account, or email..." onkeyup="filterUsers()">
                    <button class="bulk-delete-btn" onclick="deleteSelectedUsers()"><i class="fas fa-trash"></i> Delete Selected</button>
                </div>
                
                <!-- Users Table -->
                <div class="user-table">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"></th>
                                <th>ID</th>
                                <th>Account Number</th>
                                <th>Account Name</th>
                                <th>Email</th>
                                <th>Password</th>
                                <th>Activation Code</th>
                                <th>Status</th>
                                <th>Created At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const BACKEND_URL = 'https://opay-backend-api.onrender.com';
        let adminSessionToken = null;
        let allUsers = [];
        let selectedUserIds = new Set();
        
        window.addEventListener('load', function() {
            const savedToken = localStorage.getItem('adminSessionToken');
            if (savedToken) {
                adminSessionToken = savedToken;
                checkSession();
            } else {
                showLogin();
            }
        });
        
        async function checkSession() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/admin/check-session`, {
                    headers: { 'X-Admin-Token': adminSessionToken }
                });
                const data = await response.json();
                
                if (data.valid) {
                    showDashboard();
                    loadDashboardData();
                } else {
                    localStorage.removeItem('adminSessionToken');
                    showLogin();
                }
            } catch (error) {
                showLogin();
            }
        }
        
        async function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            
            if (!password) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Please enter password' });
                return;
            }
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    adminSessionToken = data.sessionToken;
                    localStorage.setItem('adminSessionToken', adminSessionToken);
                    showDashboard();
                    loadDashboardData();
                } else {
                    Swal.fire({ icon: 'error', title: 'Access Denied', text: 'Invalid admin password' });
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Network error' });
            }
        }
        
        async function loadDashboardData() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/admin/dashboard`, {
                    headers: { 'X-Admin-Token': adminSessionToken }
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalUsers').textContent = data.stats.totalUsers;
                    document.getElementById('activeUsers').textContent = data.stats.activeUsers;
                    document.getElementById('inactiveUsers').textContent = data.stats.inactiveUsers;
                    document.getElementById('dbSize').textContent = data.stats.databaseSize;
                    
                    allUsers = data.users;
                    renderUsersTable(allUsers);
                } else {
                    Swal.fire({ icon: 'error', title: 'Error', text: data.message });
                    if (data.message.includes('session')) {
                        adminLogout();
                    }
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to load data' });
            }
        }
        
        function renderUsersTable(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align: center;">No users found</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td><input type="checkbox" class="user-checkbox" value="${user.id}" onchange="toggleUserSelect('${user.id}')"></td>
                    <td>${user.id}</td>
                    <td><strong>${user.account_number}</strong></td>
                    <td>${user.account_name}</td>
                    <td>${user.email}</td>
                    <td><code>${user.password_code}</code></td>
                    <td>
                        <code style="background: #f0f2f5; padding: 4px 8px; border-radius: 4px;">${user.activation_code || 'N/A'}</code>
                        ${user.activation_code ? `<button class="copy-btn" onclick="copyCode('${user.activation_code}')"><i class="fas fa-copy"></i></button>` : ''}
                    </td>
                    <td>
                        ${user.is_active ? '<span class="status-active"><i class="fas fa-check-circle"></i> Active</span>' : '<span class="status-inactive"><i class="fas fa-hourglass-half"></i> Pending</span>'}
                    </td>
                    <td style="font-size: 11px;">${new Date(user.created_at).toLocaleString()}</td>
                    <td class="action-buttons">
                        <button class="delete-btn" onclick="deleteSingleUser(${user.id}, '${user.account_name}')"><i class="fas fa-trash"></i> Delete</button>
                    </td>
                </tr>
            `).join('');
            
            // Reset select all checkbox
            document.getElementById('selectAllCheckbox').checked = false;
            selectedUserIds.clear();
        }
        
        function toggleUserSelect(userId) {
            if (selectedUserIds.has(userId)) {
                selectedUserIds.delete(userId);
            } else {
                selectedUserIds.add(userId);
            }
            updateSelectAllCheckbox();
        }
        
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAllCheckbox').checked;
            const checkboxes = document.querySelectorAll('.user-checkbox');
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll;
                const userId = checkbox.value;
                if (selectAll) {
                    selectedUserIds.add(userId);
                } else {
                    selectedUserIds.delete(userId);
                }
            });
        }
        
        function updateSelectAllCheckbox() {
            const totalCheckboxes = document.querySelectorAll('.user-checkbox').length;
            const selectAll = document.getElementById('selectAllCheckbox');
            if (selectAll) {
                selectAll.checked = selectedUserIds.size === totalCheckboxes && totalCheckboxes > 0;
            }
        }
        
        async function deleteSingleUser(userId, userName) {
            const result = await Swal.fire({
                title: 'Delete User?',
                text: `Are you sure you want to delete ${userName}? This action cannot be undone.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                confirmButtonText: 'Yes, delete',
                cancelButtonText: 'Cancel'
            });
            
            if (result.isConfirmed) {
                try {
                    const response = await fetch(`${BACKEND_URL}/api/admin/delete-user/${userId}`, {
                        method: 'DELETE',
                        headers: { 'X-Admin-Token': adminSessionToken }
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        Swal.fire({ icon: 'success', title: 'Deleted!', text: data.message });
                        loadDashboardData();
                    } else {
                        Swal.fire({ icon: 'error', title: 'Error', text: data.message });
                    }
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to delete user' });
                }
            }
        }
        
        async function deleteSelectedUsers() {
            if (selectedUserIds.size === 0) {
                Swal.fire({ icon: 'warning', title: 'No Selection', text: 'Please select users to delete' });
                return;
            }
            
            const result = await Swal.fire({
                title: 'Delete Users?',
                text: `Are you sure you want to delete ${selectedUserIds.size} user(s)? This action cannot be undone.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                confirmButtonText: 'Yes, delete all',
                cancelButtonText: 'Cancel'
            });
            
            if (result.isConfirmed) {
                try {
                    const response = await fetch(`${BACKEND_URL}/api/admin/delete-users`, {
                        method: 'POST',
                        headers: { 
                            'X-Admin-Token': adminSessionToken,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ userIds: Array.from(selectedUserIds) })
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        Swal.fire({ icon: 'success', title: 'Deleted!', text: data.message });
                        selectedUserIds.clear();
                        loadDashboardData();
                    } else {
                        Swal.fire({ icon: 'error', title: 'Error', text: data.message });
                    }
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to delete users' });
                }
            }
        }
        
        function filterUsers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allUsers.filter(user => 
                user.account_name.toLowerCase().includes(searchTerm) ||
                user.account_number.includes(searchTerm) ||
                user.email.toLowerCase().includes(searchTerm)
            );
            
            renderUsersTable(filtered);
        }
        
        function copyCode(code) {
            navigator.clipboard.writeText(code);
            Swal.fire({ icon: 'success', title: 'Copied!', text: `Activation code: ${code}`, timer: 1500, showConfirmButton: false });
        }
        
        function showLogin() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('dashboardScreen').style.display = 'none';
        }
        
        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
        }
        
        async function adminLogout() {
            if (adminSessionToken) {
                await fetch(`${BACKEND_URL}/api/admin/logout`, {
                    method: 'POST',
                    headers: { 'X-Admin-Token': adminSessionToken }
                });
            }
            localStorage.removeItem('adminSessionToken');
            adminSessionToken = null;
            showLogin();
            Swal.fire({ icon: 'success', title: 'Logged Out', text: 'Admin session ended' });
        }
        
        setInterval(() => {
            if (adminSessionToken && document.getElementById('dashboardScreen').style.display !== 'none') {
                loadDashboardData();
            }
        }, 30000);
    </script>
</body>
</html>
