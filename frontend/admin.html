<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Activation Codes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .code-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .code { font-family: monospace; font-size: 24px; font-weight: bold; color: #00B875; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">🔐 Activation Codes</h2>
        <div id="codesList"></div>
    </div>
    
    <script>
        const BACKEND_URL = 'https://opay-backend-api.onrender.com';
        
        async function loadCodes() {
            const response = await fetch(`${BACKEND_URL}/api/admin/codes`);
            const data = await response.json();
            
            const container = document.getElementById('codesList');
            if (data.codes.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No pending activation codes</div>';
                return;
            }
            
            container.innerHTML = data.codes.map(code => `
                <div class="code-card">
                    <div><strong>Email:</strong> ${code.email}</div>
                    <div><strong>Account:</strong> ${code.accountNumber}</div>
                    <div><strong>Name:</strong> ${code.accountName}</div>
                    <div class="code">Code: ${code.code}</div>
                    <div><small>Expires: ${new Date(code.expiresAt).toLocaleString()}</small></div>
                </div>
            `).join('');
        }
        
        loadCodes();
        setInterval(loadCodes, 5000);
    </script>
</body>
</html>
