<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Activation Codes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .code-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .code { font-family: monospace; font-size: 24px; font-weight: bold; color: #00B875; }
        .admin-key-input { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">🔐 Admin - Activation Codes</h2>
        
        <div class="admin-key-input">
            <label>Admin Key:</label>
            <input type="password" id="adminKey" class="form-control" placeholder="Enter admin key">
            <button class="btn btn-success mt-2" onclick="loadPendingUsers()">Load Pending Activations</button>
        </div>
        
        <div id="pendingList"></div>
    </div>
    
    <script>
        const BACKEND_URL = 'https://opay-backend-api.onrender.com';
        
        async function loadPendingUsers() {
            const adminKey = document.getElementById('adminKey').value;
            
            if (!adminKey) {
                alert('Please enter admin key');
                return;
            }
            
            const response = await fetch(`${BACKEND_URL}/api/admin/pending`);
            const data = await response.json();
            
            const container = document.getElementById('pendingList');
            
            if (data.pending.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No pending activations</div>';
                return;
            }
            
            container.innerHTML = data.pending.map(user => `
                <div class="code-card">
                    <div><strong>Name:</strong> ${user.account_name}</div>
                    <div><strong>Account:</strong> ${user.account_number}</div>
                    <div><strong>Email:</strong> ${user.email}</div>
                    <div class="code">Activation Code: ${user.activation_code}</div>
                    <div><small>Created: ${new Date(user.created_at).toLocaleString()}</small></div>
                    <button class="btn btn-sm btn-primary mt-2" onclick="copyCode('${user.activation_code}')">Copy Code</button>
                </div>
            `).join('');
        }
        
        function copyCode(code) {
            navigator.clipboard.writeText(code);
            alert('Activation code copied: ' + code);
        }
    </script>
</body>
</html>
