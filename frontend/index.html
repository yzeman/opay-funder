<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OPay - Beyond Banking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Using OPay's font - Inter (similar to image) */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', Helvetica, Arial, sans-serif;
            background: #00B875;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Main Container */
        .app-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
        }

        /* Card Style */
        .intro-card {
            background: transparent;
            text-align: center;
        }

        /* OPay Logo Area - Smaller */
        .opay-logo {
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .logo-icon:hover {
            transform: scale(1.05);
        }

        .logo-icon img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        /* "We are Beyond Banking" Text */
        .beyond-text {
            margin: 30px 0 25px;
        }

        .beyond-title {
            color: #19247D;
            
            font-size: 30px;
            font-weight: 800;
            line-height: 1.3;
            letter-spacing: 2px;  /* try 1px, 2px, 3px... */
        }

        /* CBN & NDIC License Badge - Logo beside text */
        .license-badge {
            
            border-radius: 40px;
            padding: 14px 20px;
            margin: 35px 0;
            margin-top:-20px;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        .license-badge img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .license-text {
            color: #19247D;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .license-text span {
            font-weight: 800;
            font-size: 30px;
            color: #19247D;
        }

        

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intro-card {
            animation: fadeInUp 0.8s ease;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .intro-card {
                padding: 20px 15px 30px;
            }
            
            .beyond-title {
                font-size: 24px;
            }
            
            .logo-icon {
                width: 40px;
                height: 40px;
            }
            
            .logo-icon img {
                width: 32px;
                height: 32px;
            }
            
            .license-text {
                font-size: 10px;
            }
            
            .license-text span {
                font-size: 23px;
            }
            
            .license-badge img {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="intro-card">
            <!-- OPay Logo Section - Small -->
            <div class="opay-logo">
                <div class="logo-icon">
                    <img src="images/opay.png" alt="OPay Logo">
                </div>
            </div>
            
            <!-- "We are Beyond Banking" Text -->
            <div class="beyond-text">
                <div class="beyond-title">We are Beyond Banking</div>
            </div>
            
            <!-- CBN & NDIC License Badge - Logo beside text -->
            <div class="license-badge">
                <img src="images/cbn.png" alt="CBN Logo">
                <div class="license-text">
                    LICENSED BY CBN AND INSURED BY <span>NDIC</span>
                </div>
            </div>
            
            
        </div>
    </div>

    <script>
        // Auto-redirect to login page after 5 seconds
        let countdown = 5;
        const countdownElement = document.getElementById('countdown');
        const getStartedBtn = document.getElementById('getStartedBtn');
        
        // Countdown timer function
        const timer = setInterval(function() {
            countdown--;
            if (countdownElement) {
                countdownElement.textContent = countdown;
            }
            
            if (countdown <= 0) {
                clearInterval(timer);
                // Redirect to login page
                window.location.href = 'login.html';
            }
        }, 1000);
        
        // Get Started Button functionality
        getStartedBtn.addEventListener('click', function(e) {
            // Clear the auto timer
            clearInterval(timer);
            
            // Button press animation
            this.style.transform = 'scale(0.97)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
            
            // Show loading state
            const originalText = this.innerHTML;
            this.innerHTML = '<div class="spinner"></div> Loading...';
            this.disabled = true;
            
            // Redirect to login page
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 500);
        });
        
        // Hover effects
        getStartedBtn.addEventListener('mouseenter', function() {
            this.style.opacity = '0.95';
        });
        
        getStartedBtn.addEventListener('mouseleave', function() {
            this.style.opacity = '1';
        });
        
        // Footer link handlers
        document.querySelectorAll('.footer-links a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                console.log(`Footer link clicked: ${this.textContent}`);
                alert(`📌 ${this.textContent}\n\nThis feature will be available in the next update.`);
            });
        });
        
        // Log successful load
        window.addEventListener('load', function() {
            console.log('✓ OPay Intro Page Loaded Successfully');
            console.log('✓ Background: OPay Green (#00B875)');
            console.log('✓ Logo: Small opay.png image');
            console.log('✓ CBN Logo: Beside license text');
            console.log('✓ Auto-redirect: Will go to login.html in 5 seconds');
        });
    </script>
</body>
</html>
