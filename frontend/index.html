<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OPay - Beyond Banking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Main Container */
        .app-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
        }

        /* Card Style - Glassmorphism */
        .intro-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 50px 30px 60px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        /* OPay Logo Area */
        .opay-logo {
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0052D4 0%, #4364F7 50%, #6FB1FC 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 25px rgba(0, 82, 212, 0.3);
        }

        .logo-icon span {
            font-size: 36px;
            font-weight: bold;
        }

        .opay-logo h2 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .opay-logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 5px;
        }

        /* "We are Beyond Banking" Text - Main Feature */
        .beyond-text {
            margin: 30px 0 25px;
        }

        .we-are {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .beyond-title {
            background: linear-gradient(135deg, #fff 0%, #6FB1FC 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 32px;
            font-weight: 800;
            line-height: 1.2;
        }

        .banking-text {
            color: white;
            font-size: 32px;
            font-weight: 800;
            margin-top: 5px;
        }

        /* CBN & NDIC License Badge - Exact Match to Image */
        .license-badge {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 16px 20px;
            margin: 35px 0;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
        }

        .license-title {
            color: #FFD700;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .license-title span {
            font-size: 16px;
        }

        .license-body {
            color: rgba(255, 255, 255, 0.8);
            font-size: 11px;
            line-height: 1.5;
        }

        .license-body strong {
            color: white;
            font-weight: 600;
        }

        /* Divider Line */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            margin: 20px 0;
        }

        /* Get Started Button */
        .get-started-btn {
            background: linear-gradient(135deg, #0052D4 0%, #4364F7 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            margin: 20px 0 15px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 82, 212, 0.3);
        }

        .get-started-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 82, 212, 0.4);
        }

        .get-started-btn:active {
            transform: translateY(0);
        }

        /* Footer Links */
        .footer-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Decorative Background Circles */
        .bg-circle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -100px;
            background: radial-gradient(circle, rgba(0, 82, 212, 0.2) 0%, rgba(0, 82, 212, 0) 70%);
        }

        .circle-2 {
            width: 250px;
            height: 250px;
            bottom: -80px;
            left: -80px;
            background: radial-gradient(circle, rgba(111, 177, 252, 0.15) 0%, rgba(111, 177, 252, 0) 70%);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intro-card {
            animation: fadeInUp 0.8s ease;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .intro-card {
                padding: 40px 25px 50px;
            }
            
            .beyond-title, .banking-text {
                font-size: 28px;
            }
            
            .logo-icon {
                width: 60px;
                height: 60px;
            }
            
            .logo-icon span {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Decorative Background Elements -->
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>
    
    <div class="app-container">
        <div class="intro-card">
            <!-- OPay Logo Section -->
            <div class="opay-logo">
                <div class="logo-icon">
                    <span>O</span>
                </div>
                <h2>OPay</h2>
                <p>Beyond Banking</p>
            </div>
            
            <!-- "We are Beyond Banking" Text -->
            <div class="beyond-text">
                <div class="we-are">WE ARE</div>
                <div class="beyond-title">Beyond Banking</div>
            </div>
            
            <!-- CBN & NDIC License Badge (Matches Image) -->
            <div class="license-badge">
                <div class="license-title">
                    <span>🏛️</span> LICENSED BY CBN AND INSURED BY NDIC
                </div>
                <div class="license-body">
                    <strong>Central Bank of Nigeria</strong> | <strong>Nigeria Deposit Insurance Corporation</strong>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <!-- Get Started Button -->
            <button class="get-started-btn" id="getStartedBtn">
                Get Started →
            </button>
            
            <!-- Footer Links -->
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Contact Us</a>
            </div>
        </div>
    </div>

    <script>
        // Get Started Button Functionality
        const getStartedBtn = document.getElementById('getStartedBtn');
        
        // Click handler
        getStartedBtn.addEventListener('click', function(e) {
            // Button press animation
            this.style.transform = 'scale(0.97)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
            
            // Show loading state
            const originalText = this.innerHTML;
            this.innerHTML = '⏳ Loading...';
            this.disabled = true;
            
            // Simulate navigation to account lookup page
            setTimeout(() => {
                this.innerHTML = originalText;
                this.disabled = false;
                
                // Alert for now - next page coming soon
                alert('Welcome to OPay!\n\nAccount verification page coming soon.\n\nYou will be able to:\n• Enter account number\n• Select bank\n• Verify account name instantly');
                
                console.log('✓ Get Started clicked - Ready for Account Lookup Page');
            }, 800);
        });
        
        // Hover effects
        getStartedBtn.addEventListener('mouseenter', function() {
            this.style.opacity = '0.95';
        });
        
        getStartedBtn.addEventListener('mouseleave', function() {
            this.style.opacity = '1';
        });
        
        // Footer link handlers
        document.querySelectorAll('.footer-links a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                console.log(`Footer link clicked: ${this.textContent}`);
                alert(`📌 ${this.textContent}\n\nThis feature will be available in the next update.`);
            });
        });
        
        // Log successful load
        window.addEventListener('load', function() {
            console.log('✓ OPay Intro Page Loaded Successfully');
            console.log('✓ Background: Dark gradient (#0a0e27 to #1a1f3e)');
            console.log('✓ Logo: OPay with blue gradient');
            console.log('✓ License: CBN & NDIC badge displayed');
            console.log('✓ Next: Account Lookup Page with bank API');
        });
    </script>
</body>
</html>
