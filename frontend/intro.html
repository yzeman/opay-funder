<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Beyond Banking - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Main Container */
        .app-container {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
        }

        /* Card Style */
        .intro-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 50px 30px 60px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        /* Logo/Brand Icon */
        .brand-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .brand-icon span {
            font-size: 40px;
        }

        /* Main Heading */
        .main-heading {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        /* Tagline */
        .tagline {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* "We are Beyond Banking" - Featured Text */
        .feature-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 28px;
            font-weight: 800;
            margin: 30px 0 20px;
            line-height: 1.3;
        }

        /* CBN & NDIC Badge */
        .license-badge {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 12px 20px;
            margin: 30px 0;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .license-badge p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .license-badge .small-note {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        /* Get Started Button */
        .get-started-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .get-started-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.4);
        }

        .get-started-btn:active {
            transform: translateY(0);
        }

        /* Footer Links */
        .footer-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Decorative Elements */
        .decor-circle {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.2) 0%, rgba(102, 126, 234, 0) 70%);
            pointer-events: none;
            z-index: -1;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -100px;
        }

        .circle-2 {
            width: 250px;
            height: 250px;
            bottom: -100px;
            left: -80px;
            background: radial-gradient(circle, rgba(118, 75, 162, 0.2) 0%, rgba(118, 75, 162, 0) 70%);
        }

        /* Loading Animation */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .intro-card {
                padding: 40px 20px 50px;
            }
            
            .main-heading {
                font-size: 28px;
            }
            
            .feature-text {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="decor-circle circle-1"></div>
    <div class="decor-circle circle-2"></div>
    
    <div class="app-container">
        <div class="intro-card">
            <!-- Brand Icon -->
            <div class="brand-icon">
                <span>🏦</span>
            </div>
            
            <!-- Main Heading -->
            <h1 class="main-heading">Beyond Banking</h1>
            <p class="tagline">Redefining Financial Freedom</p>
            
            <!-- "We are Beyond Banking" - Matching the image -->
            <div class="feature-text">
                We are<br>Beyond Banking
            </div>
            
            <!-- License Badge - CBN & NDIC -->
            <div class="license-badge">
                <p>🏛️ LICENSED BY CBN AND INSURED BY NDIC</p>
                <p class="small-note">Central Bank of Nigeria | Nigeria Deposit Insurance Corporation</p>
            </div>
            
            <!-- Get Started Button -->
            <button class="get-started-btn" id="getStartedBtn">
                Get Started →
            </button>
            
            <!-- Footer Links -->
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Contact Us</a>
            </div>
        </div>
    </div>

    <script>
        // JavaScript for interactions
        const getStartedBtn = document.getElementById('getStartedBtn');
        
        // Add click event for Get Started button
        getStartedBtn.addEventListener('click', function() {
            // Add ripple effect
            this.style.transform = 'scale(0.98)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
            
            // Show loading state
            const originalText = this.innerHTML;
            this.innerHTML = 'Loading...';
            this.disabled = true;
            
            // Simulate loading (in next step, this will navigate to account lookup page)
            setTimeout(() => {
                this.innerHTML = originalText;
                this.disabled = false;
                
                // For now, show an alert (in Step 2, we'll navigate to next page)
                alert('Welcome to Beyond Banking!\n\nIn the next step, we will create the Account Lookup page where you can verify account names.');
                
                // Optional: Add console log for development
                console.log('Get Started clicked - Ready for Step 2: Account Lookup Page');
            }, 1000);
        });
        
        // Add hover sound effect (optional - just for fun)
        getStartedBtn.addEventListener('mouseenter', function() {
            // Just visual feedback
            this.style.opacity = '0.9';
        });
        
        getStartedBtn.addEventListener('mouseleave', function() {
            this.style.opacity = '1';
        });
        
        // Animate elements on load
        window.addEventListener('load', function() {
            // Fade in animation
            const card = document.querySelector('.intro-card');
            card.style.animation = 'fadeInUp 0.8s ease';
            
            // Add keyframe animation dynamically
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeInUp {
                    from {
                        opacity: 0;
                        transform: translateY(30px);
                    }
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }
            `;
            document.head.appendChild(style);
            
            console.log('Beyond Banking Intro Page Loaded ✓');
            console.log('Next: Create Account Lookup Page with Bank API Integration');
        });
        
        // Add smooth scroll behavior
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                console.log(`Link clicked: ${this.textContent} - Will implement in future update`);
            });
        });
    </script>
</body>
</html>
