<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OPay - Add Money</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fc;
            min-height: 100vh;
            padding-bottom: 30px;
        }

        /* Header */
        .header {
            background: white;
            padding: 16px 16px 10px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #333;
            padding: 5px;
            width: 40px;
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            text-align: center;
            margin: 0;
            flex: 1;
        }

        /* Add Money Card */
        .add-money-card {
            background: white;
            margin: 16px;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .add-icon {
            width: 60px;
            height: 60px;
            background: #e8f5e9;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }

        .add-icon i {
            font-size: 28px;
            color: #00B875;
        }

        .add-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .add-subtitle {
            font-size: 12px;
            color: #888;
        }

        /* Amount Section */
        .amount-section {
            background: white;
            margin: 16px;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .amount-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .amount-label {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .limit-label {
            font-size: 11px;
            font-weight: 500;
            color: #ff9800;
        }

        .amount-input-wrapper {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .currency-symbol {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            margin-right: 5px;
        }

        .amount-input {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            border: none;
            border-bottom: 2px solid #00B875;
            text-align: left;
            width: 100%;
            font-family: inherit;
            background: transparent;
            padding: 0;
        }

        .amount-input:focus {
            outline: none;
        }

        .amount-range {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        /* Quick Amount Buttons */
        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .quick-amount-btn {
            background: #f8f9fc;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            border: 1px solid #e0e4e8;
        }

        .quick-amount-btn:active {
            transform: scale(0.98);
            background: #e8f5e9;
            border-color: #00B875;
        }

        /* Confirm Button */
        .confirm-btn {
            background: #00B875;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            margin: 20px 16px;
            width: calc(100% - 32px);
            cursor: pointer;
            transition: all 0.2s;
        }

        .confirm-btn:active {
            transform: scale(0.98);
            background: #009a62;
        }

        .confirm-btn:disabled {
            background: #bbf7d0;
            cursor: not-allowed;
        }

        /* Message Indicator */
        .message-indicator {
            margin: 8px 16px;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
        }

        .message-indicator.error {
            background: #ffebee;
            color: #dc3545;
        }

        .message-indicator.success {
            background: #e8f5e9;
            color: #00B875;
        }

        .message-indicator.warning {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <button class="back-btn" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="header-title">Add Money</h1>
            <div style="width: 40px;"></div>
        </div>
    </div>

    <!-- Add Money Card -->
    <div class="add-money-card">
        <div class="add-icon">
            <i class="fas fa-plus-circle"></i>
        </div>
        <div class="add-title">Add Money to Wallet</div>
        <div class="add-subtitle">Fund your OPay Funder account</div>
    </div>

    <!-- Amount Section -->
    <div class="amount-section">
        <div class="amount-header">
            <div class="amount-label">Amount</div>
            <div class="limit-label" id="limitLabel">Max: ₦0</div>
        </div>
        <div class="amount-input-wrapper">
            <span class="currency-symbol">₦</span>
            <input type="tel" class="amount-input" id="amountInput" placeholder="0.00" inputmode="numeric">
        </div>
        <div class="amount-range" id="amountRange">Enter amount to add</div>
        
        <div class="quick-amounts">
            <div class="quick-amount-btn" data-amount="500">₦500</div>
            <div class="quick-amount-btn" data-amount="1000">₦1,000</div>
            <div class="quick-amount-btn" data-amount="5000">₦5,000</div>
            <div class="quick-amount-btn" data-amount="10000">₦10,000</div>
            <div class="quick-amount-btn" data-amount="50000">₦50,000</div>
            <div class="quick-amount-btn" data-amount="100000">₦100,000</div>
        </div>
    </div>

    <button class="confirm-btn" id="confirmBtn">Add Money</button>

    <div id="messageIndicator" class="message-indicator" style="display: none;"></div>

    <script>
    const BACKEND_URL = 'https://opay-backend-api.onrender.com';
    
    // DOM Elements
    const amountInput = document.getElementById('amountInput');
    const confirmBtn = document.getElementById('confirmBtn');
    const limitLabel = document.getElementById('limitLabel');
    const amountRange = document.getElementById('amountRange');
    
    let currentAmount = 0;
    
    // User data
    let currentUser = null;
    let userTier = '1';
    let userBalance = 0;
    
    // Tier balance limits
    const tierBalanceLimits = {
        '1': { maxBalance: 0, canAdd: false, message: 'Free tier users cannot add money. Please upgrade your plan.' },
        '2': { maxBalance: 300000, canAdd: true, message: 'Basic tier max balance: ₦300,000' },
        '3': { maxBalance: 1000000, canAdd: true, message: 'Premium tier max balance: ₦1,000,000' },
        'VIP': { maxBalance: Infinity, canAdd: true, message: 'VIP tier - Unlimited balance' }
    };
    
    // Show message indicator
    function showMessage(text, type) {
        const msgDiv = document.getElementById('messageIndicator');
        msgDiv.textContent = text;
        msgDiv.className = `message-indicator ${type}`;
        msgDiv.style.display = 'block';
        setTimeout(() => {
            msgDiv.style.display = 'none';
        }, 3000);
    }
    
    // Get current user
    async function getCurrentUser() {
        const userData = localStorage.getItem('loggedInUser');
        if (userData) {
            currentUser = JSON.parse(userData);
            userTier = localStorage.getItem(`user_tier_${currentUser.email}`) || '1';
            await fetchUserBalance();
            updateLimitDisplay();
        }
    }
    
    // Fetch user balance
    async function fetchUserBalance() {
        try {
            const response = await fetch(`${BACKEND_URL}/api/get-balance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentUser.email })
            });
            const data = await response.json();
            if (data.success) {
                userBalance = data.balance;
                console.log('Current balance:', userBalance);
                updateLimitDisplay();
            }
        } catch (error) {
            console.error('Error fetching balance:', error);
            userBalance = 0;
        }
    }
    
    // Update limit display based on tier
    function updateLimitDisplay() {
        const limits = tierBalanceLimits[userTier];
        if (limits.canAdd) {
            const maxAmount = limits.maxBalance === Infinity ? 'Unlimited' : `₦${limits.maxBalance.toLocaleString()}`;
            limitLabel.textContent = `Max: ${maxAmount}`;
            const remaining = limits.maxBalance === Infinity ? 'No limit' : `₦${(limits.maxBalance - userBalance).toLocaleString()} remaining`;
            amountRange.textContent = `Your balance: ₦${userBalance.toLocaleString()} | Can add up to: ${remaining}`;
        } else {
            limitLabel.textContent = 'Access Denied';
            amountRange.textContent = limits.message;
            confirmBtn.disabled = true;
        }
    }
    
    // Format amount input
    amountInput.addEventListener('input', function(e) {
        let val = this.value.replace(/[^0-9]/g, '');
        if (val === '') {
            this.value = '';
            currentAmount = 0;
            validateAmount();
            return;
        }
        
        let num = parseFloat(val) / 100;
        currentAmount = num;
        
        this.value = currentAmount.toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
        
        validateAmount();
    });
    
    // Quick amount buttons
    document.querySelectorAll('.quick-amount-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            let amount = parseInt(btn.getAttribute('data-amount'));
            currentAmount = amount;
            
            amountInput.value = currentAmount.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            
            validateAmount();
        });
    });
    
    // Validate amount against tier limits
    function validateAmount() {
        const limits = tierBalanceLimits[userTier];
        
        if (!limits.canAdd) {
            confirmBtn.disabled = true;
            return false;
        }
        
        if (currentAmount < 10) {
            confirmBtn.disabled = true;
            return false;
        }
        
        // Check if adding this amount would exceed max balance
        const newBalance = userBalance + currentAmount;
        if (newBalance > limits.maxBalance) {
            confirmBtn.disabled = true;
            const maxAdd = limits.maxBalance - userBalance;
            amountRange.innerHTML = `⚠️ Cannot add ₦${currentAmount.toLocaleString()}. Maximum you can add is ₦${maxAdd.toLocaleString()}`;
            return false;
        }
        
        amountRange.innerHTML = `Your balance: ₦${userBalance.toLocaleString()} | New balance: ₦${newBalance.toLocaleString()}`;
        confirmBtn.disabled = false;
        return true;
    }
    
    // Process add money transaction
    async function processAddMoney() {
        if (!validateAmount()) return;
        
        confirmBtn.disabled = true;
        confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        
        const transactionRef = 'ADD' + Date.now().toString().slice(0, 10) + Math.random().toString(36).substring(2, 15).toUpperCase().slice(0, 10);
        const newBalance = userBalance + currentAmount;
        
        const transactionData = {
            type: 'credit',
            title: 'Add Money to Wallet',
            amount: currentAmount,
            date: new Date().toLocaleString('en-US', { month: 'long', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' }),
            status: 'success',
            category: 'Add Money',
            ref: transactionRef,
            paymentMethod: 'Bank Transfer',
            note: 'Added money to wallet',
            dateObj: new Date()
        };
        
        try {
            // Update balance in backend
            const balanceResponse = await fetch(`${BACKEND_URL}/api/update-balance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: currentUser.email, 
                    amount: currentAmount,
                    operation: 'add'
                })
            });
            
            const balanceData = await balanceResponse.json();
            
            if (balanceData.success) {
                // Save transaction
                let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
                transactions.unshift(transactionData);
                localStorage.setItem('transactions', JSON.stringify(transactions));
                
                localStorage.setItem('transactionData', JSON.stringify(transactionData));
                
                showMessage(`✓ ₦${currentAmount.toLocaleString()} added successfully!`, 'success');
                
                setTimeout(() => {
                    window.location.href = 'payment.html';
                }, 1500);
            } else {
                throw new Error(balanceData.message || 'Transaction failed');
            }
        } catch (error) {
            console.error('Transaction error:', error);
            showMessage(`Failed to add money: ${error.message || 'Something went wrong'}`, 'error');
            confirmBtn.disabled = false;
            confirmBtn.innerHTML = 'Add Money';
        }
    }
    
    // Show upgrade modal for tier 1 users
    function showUpgradeModal() {
        let currentTier = userTier || '1';
        
        const overlay = document.createElement('div');
        overlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: flex;
            align-items: flex-end;
        `;
        
        overlay.innerHTML = `
            <div style="background: white; width: 100%; border-radius: 28px 28px 0 0; max-height: 85vh; overflow-y: auto;">
                <div style="text-align: center; padding: 20px;">
                    <div style="width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px;"></div>
                    <div style="font-size: 22px; font-weight: 700;">Upgrade Your Plan</div>
                    <div style="font-size: 13px; color: #888;">Choose a plan to add money to your wallet</div>
                </div>
                
                <div style="margin: 0 16px 12px; background: #f0f2f5; border-radius: 12px; padding: 10px; text-align: center;">
                    <span style="font-size: 12px; color: #666;">Your Current Tier: </span>
                    <span style="font-size: 14px; font-weight: 700; color: #00B875;">
                        ${currentTier === '1' || currentTier === 1 ? '⭐ Tier 1 (Free)' : 
                          currentTier === '2' || currentTier === 2 ? '🥈 Tier 2 (Basic)' : 
                          currentTier === '3' || currentTier === 3 ? '🥉 Tier 3 (Premium)' : '👑 VIP Tier'}
                    </span>
                </div>
                
                <div style="margin: 12px 16px; background: ${currentTier >= 2 ? '#e8f5e9' : 'white'}; border-radius: 20px; padding: 16px; border: 1px solid ${currentTier >= 2 ? '#00B875' : '#eee'};">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="font-size: 28px;">🥈</span>
                            <div>
                                <div style="font-size: 18px; font-weight: 700;">Basic Plan</div>
                                <div style="font-size: 11px; color: #888;">Upgrade to Tier 2</div>
                            </div>
                        </div>
                        <div style="font-size: 22px; font-weight: 700; color: #00B875;">₦30,000</div>
                    </div>
                    <div style="font-size: 12px; color: #555; margin-bottom: 12px;">
                        • Transfer to OPay only<br>
                        • Add money up to ₦300,000 max balance<br>
                        • View receipt<br>
                        • View history<br>
                        • 10 times transfer daily
                    </div>
                    <button class="plan-btn" data-plan="basic" data-tier="2" style="width: 100%; padding: 12px; background: #00B875; color: white; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer;">Upgrade to Basic ></button>
                </div>
                
                <div style="margin: 12px 16px; background: ${currentTier >= 3 ? '#e8f5e9' : 'white'}; border-radius: 20px; padding: 16px; border: 1px solid ${currentTier >= 3 ? '#00B875' : '#eee'};">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="font-size: 28px;">🥉</span>
                            <div>
                                <div style="font-size: 18px; font-weight: 700;">Premium Plan</div>
                                <div style="font-size: 11px; color: #888;">Upgrade to Tier 3</div>
                            </div>
                        </div>
                        <div style="font-size: 22px; font-weight: 700; color: #00B875;">₦50,000</div>
                    </div>
                    <div style="font-size: 12px; color: #555; margin-bottom: 12px;">
                        Everything in Basic plus:<br>
                        • OPay and bank transfer<br>
                        • Add money up to ₦1,000,000 max balance<br>
                        • Unlimited transfer daily
                    </div>
                    <button class="plan-btn" data-plan="premium" data-tier="3" style="width: 100%; padding: 12px; background: #00B875; color: white; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer;">Upgrade to Premium ></button>
                </div>
                
                <div style="margin: 12px 16px; background: ${currentTier === 'VIP' ? '#e8f5e9' : 'white'}; border-radius: 20px; padding: 16px; border: 2px solid #FFD700;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="font-size: 28px;">👑</span>
                            <div>
                                <div style="font-size: 18px; font-weight: 700; color: #FF6B35;">VIP Plan</div>
                                <div style="font-size: 11px; color: #888;">Upgrade to VIP Tier</div>
                            </div>
                        </div>
                        <div style="font-size: 22px; font-weight: 700; color: #FF6B35;">₦100,000</div>
                    </div>
                    <div style="font-size: 12px; color: #555; margin-bottom: 12px;">
                        Everything in Basic and Premium plus:<br>
                        • Unlimited add money<br>
                        • Airtime & Data purchase<br>
                        • No transaction limits
                    </div>
                    <button class="plan-btn" data-plan="vip" data-tier="VIP" style="width: 100%; padding: 12px; background: #FF6B35; color: white; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer;">Upgrade to VIP ></button>
                </div>
                
                <div style="padding: 16px 20px 30px;">
                    <button id="closeUpgradeSheet" style="width: 100%; padding: 14px; background: #f0f2f5; border: none; border-radius: 30px; font-size: 15px; font-weight: 600; color: #666; cursor: pointer;">Close</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        
        document.getElementById('closeUpgradeSheet')?.addEventListener('click', () => {
            overlay.remove();
            document.body.style.overflow = '';
        });
        
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.remove();
                document.body.style.overflow = '';
            }
        });
        
        overlay.querySelectorAll('.plan-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const plan = btn.getAttribute('data-plan');
                const tier = btn.getAttribute('data-tier');
                localStorage.setItem('selected_plan', JSON.stringify({
                    plan: plan,
                    tier: tier,
                    price: plan === 'basic' ? 30000 : (plan === 'premium' ? 50000 : 100000)
                }));
                window.location.href = 'plan.html';
            });
        });
    }
    
    // Confirm button click
    confirmBtn.addEventListener('click', async () => {
        const limits = tierBalanceLimits[userTier];
        
        // Check if user can add money (Tier 1 cannot)
        if (!limits.canAdd) {
            showUpgradeModal();
            return;
        }
        
        if (currentAmount < 10) {
            showMessage('Minimum amount is ₦10.00', 'error');
            return;
        }
        
        // Check balance limit
        const newBalance = userBalance + currentAmount;
        if (newBalance > limits.maxBalance) {
            const maxAdd = limits.maxBalance - userBalance;
            showMessage(`Cannot add ₦${currentAmount.toLocaleString()}. Maximum you can add is ₦${maxAdd.toLocaleString()}`, 'error');
            return;
        }
        
        // Show confirmation
        Swal.fire({
            title: 'Confirm Add Money',
            html: `
                <div style="text-align: left;">
                    <p><strong>Amount:</strong> ₦${currentAmount.toLocaleString()}</p>
                    <p><strong>Current Balance:</strong> ₦${userBalance.toLocaleString()}</p>
                    <p><strong>New Balance:</strong> ₦${newBalance.toLocaleString()}</p>
                    <p><strong>Fee:</strong> ₦0.00</p>
                </div>
            `,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#00B875',
            cancelButtonColor: '#dc3545',
            confirmButtonText: 'Confirm',
            cancelButtonText: 'Cancel'
        }).then((result) => {
            if (result.isConfirmed) {
                processAddMoney();
            }
        });
    });
    
    // Initialize
    getCurrentUser();
    
    console.log('✅ Add Money page loaded - Tier limits applied');
    </script>
</body>
</html>
