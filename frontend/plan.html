<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OPay - Choose Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fc;
            min-height: 100vh;
            padding-bottom: 30px;
        }

        .header {
            background: white;
            padding: 16px 16px 10px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #333;
            padding: 5px;
            width: 40px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            text-align: center;
            margin: 0;
            flex: 1;
        }

        /* Debug Panel - Sticky at top */
        .debug-panel {
            background: #1a1a1a;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            padding: 12px;
            border-radius: 0;
            max-height: 250px;
            overflow-y: auto;
            position: sticky;
            top: 60px;
            z-index: 1000;
            margin: 0;
            border-bottom: 2px solid #00B875;
        }
        
        .debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }
        
        .debug-title {
            font-weight: bold;
            color: #0f0;
        }
        
        .copy-btn {
            background: #00B875;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        
        .copy-btn:active {
            transform: scale(0.95);
        }
        
        .debug-content {
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .debug-content div {
            margin-bottom: 3px;
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }

        .current-tier-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 16px;
            padding: 20px;
            border-radius: 20px;
            color: white;
            text-align: center;
        }

        .current-tier-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .current-tier-name {
            font-size: 24px;
            font-weight: 700;
        }

        .plan-card {
            background: white;
            margin: 16px;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s;
            cursor: pointer;
        }

        .plan-card:active {
            transform: scale(0.98);
        }

        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .plan-icon {
            font-size: 40px;
        }

        .plan-price {
            font-size: 24px;
            font-weight: 700;
            color: #00B875;
        }

        .plan-price small {
            font-size: 12px;
            font-weight: 400;
            color: #888;
        }

        .plan-name {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .plan-features {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }

        .plan-features li {
            padding: 6px 0;
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .plan-features i {
            color: #00B875;
            font-size: 12px;
            width: 16px;
        }

        .upgrade-btn {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            border: none;
        }

        .upgrade-btn.active {
            background: #00B875;
            color: white;
        }

        .upgrade-btn.disabled {
            background: #e8f5e9;
            color: #00B875;
            cursor: default;
        }

        .upgrade-btn.vip {
            background: #FF6B35;
            color: white;
        }

        .payment-section {
            background: white;
            margin: 16px;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .payment-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 15px;
        }

        .payment-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .payment-icons i {
            font-size: 32px;
            color: #888;
        }

        .confirmation-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .confirmation-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: white;
            width: 320px;
            border-radius: 32px;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .confirmation-modal.active .modal-container {
            transform: scale(1);
        }

        .modal-header {
            background: linear-gradient(135deg, #00B875, #009a62);
            padding: 24px;
            text-align: center;
            color: white;
        }

        .modal-icon {
            font-size: 38px;
            margin-bottom: 12px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .modal-body {
            padding: 20px;
        }

        .plan-summary {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .summary-label {
            font-size: 13px;
            color: #888;
        }

        .summary-value {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .summary-amount {
            font-size: 16px;
            font-weight: 700;
            color: #00B875;
        }

        .payment-methods {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 16px 0;
            padding: 12px;
            background: #f8f9fc;
            border-radius: 16px;
        }

        .payment-methods i {
            font-size: 24px;
            color: #888;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            border: none;
        }

        .modal-btn.confirm {
            background: #00B875;
            color: white;
        }

        .modal-btn.cancel {
            background: #f0f2f5;
            color: #666;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 3500;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #00B875;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: white;
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <button class="back-btn" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="header-title">Choose Your Plan</h1>
            <div style="width: 40px;"></div>
        </div>
    </div>

    <!-- Debug Panel at Top - Copyable -->
    <div id="debugPanel" class="debug-panel">
        <div class="debug-header">
            <span class="debug-title">🔍 DEBUG LOGS (Click Copy to share)</span>
            <button class="copy-btn" onclick="copyDebugLogs()">📋 Copy Logs</button>
        </div>
        <div id="debugContent" class="debug-content">
            <div>⏳ Initializing...</div>
        </div>
    </div>

    <div id="planContent">
        <div class="loading" style="text-align: center; padding: 50px;">
            <i class="fas fa-spinner fa-spin"></i> Loading...
        </div>
    </div>

    <div id="confirmationModal" class="confirmation-modal">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-icon">💎</div>
                <div class="modal-title" id="modalPlanName">Upgrade Plan</div>
            </div>
            <div class="modal-body">
                <div class="plan-summary">
                    <div class="summary-row">
                        <span class="summary-label">Selected Plan</span>
                        <span class="summary-value" id="summaryPlanName">-</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Amount</span>
                        <span class="summary-amount" id="summaryAmount">-</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Payment Method</span>
                        <span class="summary-value">Paystack</span>
                    </div>
                </div>

                <div class="payment-methods">
                    <i class="fab fa-cc-visa"></i>
                    <i class="fab fa-cc-mastercard"></i>
                    <i class="fab fa-cc-amex"></i>
                    <i class="fas fa-university"></i>
                </div>

                <div class="modal-buttons">
                    <button class="modal-btn cancel" id="cancelBtn">Cancel</button>
                    <button class="modal-btn confirm" id="confirmBtn">Proceed to Payment</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">Processing payment request...</div>
    </div>

    <script>
        const BACKEND_URL = 'https://opay-backend-api-pncl.onrender.com';
        
        let currentUser = null;
        let userTier = '1';
        let pendingPlan = null;
        let debugLogs = [];

        function addDebugLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            debugLogs.push(logEntry);
            
            const debugContent = document.getElementById('debugContent');
            debugContent.innerHTML += `<div>${escapeHtml(logEntry)}</div>`;
            debugContent.scrollTop = debugContent.scrollHeight;
            
            console.log(logEntry);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyDebugLogs() {
            const logsText = debugLogs.join('\n');
            navigator.clipboard.writeText(logsText).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'Copied!',
                    text: 'Debug logs copied to clipboard',
                    timer: 1500,
                    showConfirmButton: false
                });
            }).catch(() => {
                alert('Copy failed. Here are the logs:\n\n' + logsText);
            });
        }

        function showLoading(show, text = 'Processing payment request...') {
            const overlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            loadingText.textContent = text;
            if (show) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        function showMessage(icon, title, text) {
            Swal.fire({ 
                icon: icon, 
                title: title, 
                text: text, 
                confirmButtonColor: '#00B875' 
            });
        }

        function showConfirmationModal(plan, tier, price, planName) {
            pendingPlan = { plan, tier, price, planName };
            
            document.getElementById('modalPlanName').textContent = `Upgrade to ${planName}`;
            document.getElementById('summaryPlanName').textContent = planName;
            document.getElementById('summaryAmount').innerHTML = `₦${price.toLocaleString()}`;
            
            const modal = document.getElementById('confirmationModal');
            modal.classList.add('active');
        }

        function hideConfirmationModal() {
            const modal = document.getElementById('confirmationModal');
            modal.classList.remove('active');
            pendingPlan = null;
        }

        async function initializePayment() {
            addDebugLog('========================================');
            addDebugLog('PAYMENT INITIALIZATION STARTED');
            addDebugLog('========================================');
            
            if (!pendingPlan) {
                addDebugLog('❌ ERROR: No plan selected');
                showMessage('error', 'Error', 'No plan selected');
                return;
            }
            
            if (!currentUser || !currentUser.email) {
                addDebugLog('❌ ERROR: User not logged in or email missing');
                showMessage('error', 'Error', 'User not logged in');
                window.location.href = 'login1.html';
                return;
            }
            
            addDebugLog(`✅ Plan: ${pendingPlan.plan}`);
            addDebugLog(`✅ Tier: ${pendingPlan.tier}`);
            addDebugLog(`✅ Amount: ₦${pendingPlan.price}`);
            addDebugLog(`✅ Email: ${currentUser.email}`);
            
            hideConfirmationModal();
            showLoading(true, 'Initializing payment...');
            
            const requestBody = {
                email: currentUser.email,
                amount: pendingPlan.price,
                plan: pendingPlan.plan,
                tier: pendingPlan.tier
            };
            
            addDebugLog(`📡 Request URL: ${BACKEND_URL}/api/initialize-payment`);
            addDebugLog(`📦 Request Body: ${JSON.stringify(requestBody)}`);
            
            try {
                addDebugLog('🚀 Sending request to backend...');
                
                const response = await fetch(`${BACKEND_URL}/api/initialize-payment`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });
                
                addDebugLog(`📥 Response status: ${response.status} ${response.statusText}`);
                
                const data = await response.json();
                addDebugLog(`📄 Response data: ${JSON.stringify(data, null, 2)}`);
                
                if (data.success && data.authorization_url) {
                    addDebugLog(`✅ SUCCESS! Payment URL received`);
                    addDebugLog(`🔗 Redirecting to: ${data.authorization_url}`);
                    showLoading(true, 'Redirecting to payment gateway...');
                    setTimeout(() => {
                        window.location.href = data.authorization_url;
                    }, 1000);
                } else {
                    addDebugLog(`❌ ERROR: Payment initialization failed`);
                    addDebugLog(`❌ Message: ${data.message}`);
                    showLoading(false);
                    showMessage('error', 'Payment Error', data.message || 'Could not initialize payment. Please try again.');
                }
            } catch (error) {
                addDebugLog(`❌ EXCEPTION: ${error.message}`);
                addDebugLog(`❌ Stack: ${error.stack}`);
                showLoading(false);
                showMessage('error', 'Connection Error', error.message || 'Network error. Please check your connection.');
            }
            
            addDebugLog('========================================');
        }

        async function testBackendConnection() {
            addDebugLog('🔍 Testing backend connection...');
            try {
                const response = await fetch(`${BACKEND_URL}/health`);
                const data = await response.json();
                addDebugLog(`✅ Backend health check: ${JSON.stringify(data)}`);
                return data;
            } catch (error) {
                addDebugLog(`❌ Backend connection FAILED: ${error.message}`);
                showMessage('error', 'Connection Error', 'Cannot connect to payment server. Please try again later.');
                return null;
            }
        }

        async function loadUser() {
            addDebugLog('👤 Loading user data...');
            const userData = localStorage.getItem('loggedInUser');
            if (!userData) {
                addDebugLog('❌ No user found in localStorage, redirecting to login');
                window.location.href = 'login1.html';
                return null;
            }
            currentUser = JSON.parse(userData);
            addDebugLog(`✅ User loaded: ${currentUser.email}`);
            
            await testBackendConnection();
            
            userTier = localStorage.getItem(`user_tier_${currentUser.email}`);
            addDebugLog(`📊 User tier from localStorage: ${userTier || 'not found'}`);
            
            if (!userTier) {
                try {
                    addDebugLog('🔄 Fetching user tier from backend...');
                    const response = await fetch(`${BACKEND_URL}/api/get-profile`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: currentUser.email })
                    });
                    const data = await response.json();
                    addDebugLog(`📄 Profile response: ${JSON.stringify(data)}`);
                    if (data.success && data.profile && data.profile.user_tier) {
                        userTier = data.profile.user_tier;
                        localStorage.setItem(`user_tier_${currentUser.email}`, userTier);
                        addDebugLog(`✅ User tier updated: ${userTier}`);
                    } else {
                        userTier = '1';
                        addDebugLog(`⚠️ Using default tier: ${userTier}`);
                    }
                } catch (error) {
                    addDebugLog(`❌ Failed to fetch profile: ${error.message}`);
                    userTier = '1';
                }
            }
            
            addDebugLog(`🎯 Final user tier: ${userTier}`);
            return currentUser;
        }

        function renderPlans() {
            addDebugLog('🎨 Rendering plans...');
            const container = document.getElementById('planContent');
            const currentTierName = userTier === '1' ? '⭐ Free Tier' : 
                                     userTier === '2' ? '🥈 Basic Tier' : 
                                     userTier === '3' ? '🥉 Premium Tier' : 
                                     userTier === 'VIP' ? '👑 VIP Tier' : '⭐ Free Tier';
            
            container.innerHTML = `
                <div class="current-tier-card">
                    <div class="current-tier-label">Your Current Tier</div>
                    <div class="current-tier-name">${currentTierName}</div>
                </div>

                <div class="plan-card" data-plan="basic" data-tier="2" data-price="30000" data-name="Basic Plan">
                    <div class="plan-header">
                        <div class="plan-icon">🥈</div>
                        <div class="plan-price">₦30,000 <small>/ one-time</small></div>
                    </div>
                    <div class="plan-name">Basic Plan</div>
                    <ul class="plan-features">
                        <li><i class="fas fa-check-circle"></i> Transfer to OPay only</li>
                        <li><i class="fas fa-check-circle"></i> Add money unlock</li>
                        <li><i class="fas fa-check-circle"></i> View receipt & history</li>
                        <li><i class="fas fa-check-circle"></i> Payment proof - no watermark</li>
                        <li><i class="fas fa-check-circle"></i> Activate banner removed</li>
                        <li><i class="fas fa-check-circle"></i> 10 times transfer daily</li>
                        <li><i class="fas fa-check-circle"></i> Add Money limit ₦300,000</li>
                    </ul>
                    <button class="upgrade-btn ${parseInt(userTier) >= 2 ? 'disabled' : 'active'}" ${parseInt(userTier) >= 2 ? 'disabled' : ''}>
                        ${parseInt(userTier) >= 2 ? '✓ Already Purchased' : 'Upgrade to Basic →'}
                    </button>
                </div>

                <div class="plan-card" data-plan="premium" data-tier="3" data-price="50000" data-name="Premium Plan">
                    <div class="plan-header">
                        <div class="plan-icon">🥉</div>
                        <div class="plan-price">₦50,000 <small>/ one-time</small></div>
                    </div>
                    <div class="plan-name">Premium Plan</div>
                    <ul class="plan-features">
                        <li><i class="fas fa-check-circle"></i> Everything in Basic plus:</li>
                        <li><i class="fas fa-check-circle"></i> History access, recent recipients</li>
                        <li><i class="fas fa-check-circle"></i> OPay and bank transfer</li>
                        <li><i class="fas fa-check-circle"></i> Custom sender name</li>
                        <li><i class="fas fa-check-circle"></i> Edit receipt & custom status</li>
                        <li><i class="fas fa-check-circle"></i> Unlimited transfer daily</li>
                        <li><i class="fas fa-check-circle"></i> Add Money limit ₦1,000,000</li>
                    </ul>
                    <button class="upgrade-btn ${parseInt(userTier) >= 3 ? 'disabled' : 'active'}" ${parseInt(userTier) >= 3 ? 'disabled' : ''}>
                        ${parseInt(userTier) >= 3 ? '✓ Already Purchased' : 'Upgrade to Premium →'}
                    </button>
                </div>

                <div class="plan-card" data-plan="vip" data-tier="VIP" data-price="100000" data-name="VIP Plan">
                    <div class="plan-header">
                        <div class="plan-icon">👑</div>
                        <div class="plan-price">₦100,000 <small>/ one-time</small></div>
                    </div>
                    <div class="plan-name">VIP Plan</div>
                    <ul class="plan-features">
                        <li><i class="fas fa-check-circle"></i> Everything in Basic and Premium plus:</li>
                        <li><i class="fas fa-check-circle"></i> OPay Funder in-app transfers</li>
                        <li><i class="fas fa-check-circle"></i> Statement of account generation</li>
                        <li><i class="fas fa-check-circle"></i> Receivers receive alert</li>
                        <li><i class="fas fa-check-circle"></i> Airtime & Data purchase</li>
                        <li><i class="fas fa-check-circle"></i> Add money unlimited</li>
                        <li><i class="fas fa-check-circle"></i> No transaction limits</li>
                    </ul>
                    <button class="upgrade-btn vip ${userTier === 'VIP' ? 'disabled' : 'active'}" ${userTier === 'VIP' ? 'disabled' : ''}>
                        ${userTier === 'VIP' ? '✓ Already Purchased' : 'Upgrade to VIP →'}
                    </button>
                </div>

                <div class="payment-section">
                    <div class="payment-title">Secure Payment Methods</div>
                    <div class="payment-icons">
                        <i class="fab fa-cc-visa"></i>
                        <i class="fab fa-cc-mastercard"></i>
                        <i class="fab fa-cc-amex"></i>
                        <i class="fas fa-university"></i>
                    </div>
                    <div style="font-size: 11px; color: #888; margin-top: 12px;">
                        Payments are processed securely via Paystack
                    </div>
                </div>
            `;

            document.querySelectorAll('.plan-card').forEach(card => {
                const btn = card.querySelector('.upgrade-btn');
                if (btn && !btn.disabled) {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const plan = card.getAttribute('data-plan');
                        const tier = card.getAttribute('data-tier');
                        const price = parseInt(card.getAttribute('data-price'));
                        const name = card.getAttribute('data-name');
                        
                        addDebugLog(`🖱️ Plan selected: ${name} (${plan}, Tier ${tier}, ₦${price})`);
                        showConfirmationModal(plan, tier, price, name);
                    });
                }
            });
            
            addDebugLog('✅ Plans rendered successfully');
        }

        document.getElementById('confirmBtn').addEventListener('click', () => {
            addDebugLog('🖱️ Confirm button clicked, calling initializePayment()');
            initializePayment();
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            addDebugLog('🖱️ Cancel button clicked');
            hideConfirmationModal();
        });

        document.getElementById('confirmationModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('confirmationModal')) {
                addDebugLog('🖱️ Modal background clicked, closing');
                hideConfirmationModal();
            }
        });

        async function init() {
            addDebugLog('========================================');
            addDebugLog('PAGE INITIALIZATION STARTED');
            addDebugLog(`🌐 Backend URL: ${BACKEND_URL}`);
            addDebugLog('========================================');
            await loadUser();
            renderPlans();
            addDebugLog('========================================');
            addDebugLog('PAGE INITIALIZATION COMPLETE');
            addDebugLog('========================================');
        }

        init();
    </script>
</body>
</html>
