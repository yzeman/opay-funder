<!DOCTYPE html>
<html>
<head>
    <title>Processing Payment...</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <script>
        const BACKEND_URL = 'https://opay-backend-api-pncl.onrender.com';
        
        async function verifyPayment() {
            const urlParams = new URLSearchParams(window.location.search);
            const reference = urlParams.get('reference');
            
            if (!reference) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'No payment reference found'
                }).then(() => {
                    window.location.href = 'plan.html';
                });
                return;
            }
            
            // Get user email from localStorage
            const userData = localStorage.getItem('loggedInUser');
            if (!userData) {
                window.location.href = 'login1.html';
                return;
            }
            
            const user = JSON.parse(userData);
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/verify-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        reference: reference,
                        email: user.email
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Store the tier in localStorage
                    localStorage.setItem(`user_tier_${user.email}`, data.tier);
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Payment Successful!',
                        text: data.message,
                        confirmButtonColor: '#00B875'
                    }).then(() => {
                        window.location.href = 'dashboard.html';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Verification Failed',
                        text: data.message,
                        confirmButtonColor: '#00B875'
                    }).then(() => {
                        window.location.href = 'plan.html';
                    });
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Something went wrong verifying payment'
                }).then(() => {
                    window.location.href = 'plan.html';
                });
            }
        }
        
        verifyPayment();
    </script>
    <div style="text-align: center; padding: 50px;">
        <h2>Verifying your payment...</h2>
        <p>Please wait while we confirm your transaction.</p>
    </div>
</body>
</html>
