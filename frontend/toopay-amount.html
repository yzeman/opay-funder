<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>OPay - Enter Amount</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fc;
            min-height: 100vh;
            padding-bottom: 30px;
        }

        /* Header */
        .header {
            background: white;
            padding: 16px 16px 10px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #333;
            padding: 5px;
            width: 40px;
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            text-align: center;
            margin: 0;
            flex: 1;
        }

        /* Recipient Card */
        .recipient-card {
            background: #f8f9fc;
            margin: 16px;
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            
        }

        .bank-icon {
            width: 50px;
            height: 50px;
            background: #f0fdf4;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bank-icon img {
            width: 35px;
            height: 35px;
            object-fit: contain;
        }

        .recipient-info {
            flex: 1;
        }

        .recipient-name {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .recipient-account {
            font-size: 13px;
            color: #888;
        }

        /* Amount Section */
.amount-section {
    background: white;
    margin: -16px 16px 1px;
    border-radius: 20px;
    padding: 20px;
    
}

.amount-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.amount-label {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
}

.no-fee-label {
    font-size: 12px;
    font-weight: 500;
    color: #00B875;
}

.amount-input-wrapper {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
}

.currency-symbol {
    font-size: 25px;
    font-weight: 400;
    color: #1a1a1a;
    margin-right: 5px;
}

.amount-input {
    font-size: 25px;
    font-weight: 500;
    color: #1a1a1a;
    border: none;
    border-bottom: 2px solid #00B875;  /* only bottom border + color */
    text-align: left;
    width: 100%;
    font-family: inherit;
    background: transparent;
    padding: 0;
}
input::placeholder {
  color: #aaa8;
  transition: color 0.2s;
}

input:focus::placeholder {
  color: transparent;
}

.amount-input:focus {
    outline: none;
}

.amount-range {
    font-size: 13px;
    color: #888;
    margin-top: 5px;
}

        /* Quick Amount Buttons */
        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            
        }

        .quick-amount-btn {
            background: #f8f9fc;
            
            border-radius: 5px;
            padding: 10px;
            font-size: 13px;
            font-weight: 450;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .quick-amount-btn:active {
            transform: scale(0.98);
            background: #e8f5e9;
            border-color: #00B875;
        }

        /* Remark Section */
        .remark-section {
            background: white;
            margin: 16px;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .remark-title {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .remark-input {
            width: 100%;
            padding: 12px;
            border: none;
            border-bottom: 1px solid #aaa5;  /* only bottom border + color */
            border-radius: 12px;
            font-size: 14px;
            background: white;
        }

        .remark-input:focus {
            outline: none;
            border-color: #00B875;
        }

        /* Purchase/Personal Tags */
        .tag-section {
            display: flex;
            gap: 16px;
            margin-top: 12px;
        }

        .tag-btn {
            flex: 1;
            padding: 10px;
            background: #f8f9fa;
            l
            border-radius: 5px;
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .tag-btn.active {
            background: #00B875;
            border-color: #00B875;
            color: white;
        }

        .tag-btn:active {
            transform: scale(0.98);
        }

        /* Confirm Button */
        .confirm-btn {
            background: #00B875;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            margin: 20px 16px;
            width: calc(100% - 32px);
            cursor: pointer;
            transition: all 0.2s;
        }

        .confirm-btn:active {
            transform: scale(0.98);
            background: #009a62;
        }

        .confirm-btn:disabled {
            background: #bbf7d0;
            cursor: not-allowed;
        }

        /* Upgrade Modal */
        .upgrade-plan-container {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            max-width: 380px;
            margin: 0 auto;
        }

        .plan-option {
            padding: 16px;
            margin: 0 16px 12px;
            border-radius: 20px;
            border: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plan-option:hover {
            border-color: #00B875;
            background: #f0fdf4;
        }

        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .plan-name {
            font-size: 18px;
            font-weight: 700;
        }

        .plan-price {
            font-size: 20px;
            font-weight: 700;
            color: #00B875;
        }

        .plan-features {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }
        .message-indicator {
    margin: 8px 16px;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
}
.message-indicator.error {
    background: #ffebee;
    color: #dc3545;
}
.message-indicator.success {
    background: #e8f5e9;
    color: #00B875;
}
.message-indicator.warning {
    background: #fff3cd;
    color: #856404;
}
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <button class="back-btn" onclick="window.location.href='toopay.html'">
                <i class="fas fa-arrow-left"></i>
        </button>
            <h1 class="header-title">Transfer To OPay Account</h1>
            <div style="width: 40px;"></div>
        </div>
    </div>

    <!-- Recipient Card -->
    <div class="recipient-card" id="recipientCard">
        <div class="bank-icon">
            <img src="images/opay.png" alt="OPay" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1108/1108564.png'">
        </div>
        <div class="recipient-info">
            <div class="recipient-name" id="recipientName">Loading...</div>
            <div class="recipient-account" id="recipientAccount">---</div>
        </div>
    </div>

    <!-- Amount Section -->
<div class="amount-section">
    <div class="amount-header">
        <div class="amount-label">Amount</div>
        <div class="no-fee-label">No Transaction Fees</div>
    </div>
    <div class="amount-input-wrapper">
        <span class="currency-symbol">₦</span>
        <input type="tel" class="amount-input" id="amountInput" placeholder="10.00-5,000,000.00" inputmode="numeric">
    </div>

        
        <!-- Quick Amount Buttons -->
        <div class="quick-amounts">
            <div class="quick-amount-btn" data-amount="500">₦500</div>
            <div class="quick-amount-btn" data-amount="1000">₦1,000</div>
            <div class="quick-amount-btn" data-amount="2000">₦2,000</div>
            <div class="quick-amount-btn" data-amount="5000">₦5,000</div>
            <div class="quick-amount-btn" data-amount="9999">₦9,999</div>
            <div class="quick-amount-btn" data-amount="10000">₦10,000</div>
        </div>
    </div>

    <!-- Remark Section -->
    <div class="remark-section">
        <div class="remark-title">Remark</div>
        <input type="text" class="remark-input" id="remarkInput" placeholder="What's this for? (Optional)">
        
        <!-- Purchase / Personal Tags -->
        <div class="tag-section">
            <div class="tag-btn" id="purchaseTag">Purchase</div>
            <div class="tag-btn" id="personalTag">Personal</div>
        </div>
    </div>

    <!-- Confirm Button -->
    <button class="confirm-btn" id="confirmBtn">Confirm</button>

   <script>
    const BACKEND_URL = 'https://opay-backend-api.onrender.com';
    
    // Load recipient info
    const recipientData = localStorage.getItem('recipientInfo');
    if (!recipientData) {
        window.location.href = 'toopay.html';
    }
    
    const recipient = JSON.parse(recipientData);
    document.getElementById('recipientName').textContent = recipient.name;
    document.getElementById('recipientAccount').textContent = recipient.accountNumber.replace(/(\d{3})(\d{3})(\d{4})/, '$1 $2 $3');

    // DOM Elements
    const amountInput = document.getElementById('amountInput');
    const confirmBtn = document.getElementById('confirmBtn');
    const remarkInput = document.getElementById('remarkInput');
    const purchaseTag = document.getElementById('purchaseTag');
    const personalTag = document.getElementById('personalTag');
    
    let currentAmount = 0;
    let selectedTag = null;
    
    // User data
    let currentUser = null;
    let userTier = '1';
    let userBalance = 0;
    
    // Daily transfer tracking
    let todaysTransferCount = 0;
    let lastTransferDate = null;
    
    // Tier limits - NO per transaction limit, only daily transfer count
    const tierLimits = {
        '1': { canSend: true, dailyTransfers: 2, tierName: 'Free' },
        '2': { canSend: true, dailyTransfers: 10, tierName: 'Basic' },
        '3': { canSend: true, dailyTransfers: 'unlimited', tierName: 'Premium' },
        'VIP': { canSend: true, dailyTransfers: 'unlimited', tierName: 'VIP' }
    };
    
    // Show text message indicator (no toast)
    function showMessage(text, type) {
        const msgDiv = document.getElementById('messageIndicator');
        if (msgDiv) {
            msgDiv.textContent = text;
            msgDiv.className = `message-indicator ${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        } else {
            console.log(`${type}: ${text}`);
        }
    }
    
    // Get current user
    async function getCurrentUser() {
        const userData = localStorage.getItem('loggedInUser');
        if (userData) {
            currentUser = JSON.parse(userData);
            userTier = localStorage.getItem(`user_tier_${currentUser.email}`) || '1';
            await fetchUserBalance();
            await checkDailyTransferLimit();
        }
    }
    
    // Fetch user balance
    async function fetchUserBalance() {
        try {
            const response = await fetch(`${BACKEND_URL}/api/get-balance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentUser.email })
            });
            const data = await response.json();
            if (data.success) {
                userBalance = data.balance;
                console.log('User balance:', userBalance);
            }
        } catch (error) {
            console.error('Error fetching balance:', error);
            userBalance = 0;
        }
    }
    
    // Check daily transfer limit
    async function checkDailyTransferLimit() {
        const today = new Date().toDateString();
        
        const storedDate = localStorage.getItem('lastTransferDate');
        const storedCount = localStorage.getItem('todaysTransferCount');
        
        if (storedDate !== today) {
            todaysTransferCount = 0;
            lastTransferDate = today;
            localStorage.setItem('lastTransferDate', today);
            localStorage.setItem('todaysTransferCount', '0');
        } else {
            todaysTransferCount = parseInt(storedCount) || 0;
            lastTransferDate = storedDate;
        }
        
        const limit = tierLimits[userTier];
        if (limit.dailyTransfers !== 'unlimited' && todaysTransferCount >= limit.dailyTransfers) {
            return { allowed: false, remaining: 0, limit: limit.dailyTransfers };
        }
        
        return { allowed: true, remaining: limit.dailyTransfers === 'unlimited' ? 'unlimited' : limit.dailyTransfers - todaysTransferCount, limit: limit.dailyTransfers };
    }
    
    // Update transfer count after successful transfer
    function updateTransferCount() {
        todaysTransferCount++;
        localStorage.setItem('todaysTransferCount', todaysTransferCount.toString());
    }
    
    // Show upgrade modal
    function showUpgradeModal() {
        let currentTier = userTier || '1';
        
        const overlay = document.createElement('div');
        overlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: flex;
            align-items: flex-end;
        `;
        
        overlay.innerHTML = `
            <div style="background: white; width: 100%; border-radius: 28px 28px 0 0; max-height: 85vh; overflow-y: auto;">
                <div style="text-align: center; padding: 20px;">
                    <div style="width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px;"></div>
                    <div style="font-size: 22px; font-weight: 700;">Upgrade Your Plan</div>
                    <div style="font-size: 13px; color: #888;">Choose a plan to unlock more features</div>
                </div>
                
                <div style="margin: 0 16px 12px; background: #f0f2f5; border-radius: 12px; padding: 10px; text-align: center;">
                    <span style="font-size: 12px; color: #666;">Your Current Tier: </span>
                    <span style="font-size: 14px; font-weight: 700; color: #00B875;">
                        ${currentTier === '1' || currentTier === 1 ? '⭐ Free Tier (2 transfers/day)' : 
                          currentTier === '2' || currentTier === 2 ? '🥈 Tier 2 (Basic - 10 transfers/day)' : 
                          currentTier === '3' || currentTier === 3 ? '🥉 Tier 3 (Premium - Unlimited)' : '👑 VIP Tier (Unlimited)'}
                    </span>
                </div>
                
                <div style="margin: 12px 16px; background: ${currentTier >= 2 ? '#e8f5e9' : 'white'}; border-radius: 20px; padding: 16px; border: 1px solid ${currentTier >= 2 ? '#00B875' : '#eee'};">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="font-size: 28px;">🥈</span>
                            <div>
                                <div style="font-size: 18px; font-weight: 700;">Basic Plan</div>
                                <div style="font-size: 11px; color: #888;">Upgrade to Tier 2</div>
                            </div>
                        </div>
                        <div style="font-size: 22px; font-weight: 700; color: #00B875;">₦30,000</div>
                    </div>
                    <div style="font-size: 12px; color: #555; margin-bottom: 12px;">
                         • Transfer to OPay only<br>
                    • Add money unlock<br>                            
                    • View receipt<br>
                    • View history<br>
                    • payment proof - no watermark added<br>
                    • Activate banner removed<br>
                    • 10 times transfer daily<br>
                    • Add Money limit ₦300,000
                    </div>
                    <button class="plan-btn" data-plan="basic" data-tier="2" style="width: 100%; padding: 12px; background: #00B875; color: white; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; opacity: ${currentTier >= 2 ? '0.6' : '1'};" ${currentTier >= 2 ? 'disabled' : ''}>
                        ${currentTier >= 2 ? '✓ Already Purchased' : 'Upgrade to Basic >'}
                    </button>
                </div>
                
                <div style="margin: 12px 16px; background: ${currentTier >= 3 ? '#e8f5e9' : 'white'}; border-radius: 20px; padding: 16px; border: 1px solid ${currentTier >= 3 ? '#00B875' : '#eee'};">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="font-size: 28px;">🥉</span>
                            <div>
                                <div style="font-size: 18px; font-weight: 700;">Premium Plan</div>
                                <div style="font-size: 11px; color: #888;">Upgrade to Tier 3</div>
                            </div>
                        </div>
                        <div style="font-size: 22px; font-weight: 700; color: #00B875;">₦50,000</div>
                    </div>
                    <div style="font-size: 12px; color: #555; margin-bottom: 12px;">
                    Everything in Basic plus:<br>
                    • History access, recent recipients history<br>
                    • OPay and bank transfer<br>
                    • Custom sender name<br>
                    • Edit receipt<br>
                    • Custom transaction status (failed, success, pending)<br>
                    • Unlimited transfer<br>
                    • Add Money limit ₦1,000,000
                    </div>
                    <button class="plan-btn" data-plan="premium" data-tier="3" style="width: 100%; padding: 12px; background: #00B875; color: white; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; opacity: ${currentTier >= 3 ? '0.6' : '1'};" ${currentTier >= 3 ? 'disabled' : ''}>
                        ${currentTier >= 3 ? '✓ Already Purchased' : 'Upgrade to Premium >'}
                    </button>
                </div>
                
                <div style="margin: 12px 16px; background: ${currentTier === 'VIP' ? '#e8f5e9' : 'white'}; border-radius: 20px; padding: 16px; border: 2px solid ${currentTier === 'VIP' ? '#FF6B35' : '#FFD700'};">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="font-size: 28px;">👑</span>
                            <div>
                                <div style="font-size: 18px; font-weight: 700; color: #FF6B35;">VIP Plan</div>
                                <div style="font-size: 11px; color: #888;">Upgrade to VIP Tier</div>
                            </div>
                        </div>
                        <div style="font-size: 22px; font-weight: 700; color: #FF6B35;">₦100,000</div>
                    </div>
                    <div style="font-size: 12px; color: #555; margin-bottom: 12px;">
                    Everything in Basic and Premium plus:<br>
                    • OPay Funder in-app transfers<br>
                    • Statement of account generation<br>
                    • Receivers receive alert<br>
                    • Money add up to receiver balance<br>
                    • Expire in user balance after 24hrs<br>
                    • Airtime access purchase<br>
                    • Data access purchase<br>
                    • Add money unlimited<br>
                    • No transaction limit
                    </div>
                    <button class="plan-btn" data-plan="vip" data-tier="VIP" style="width: 100%; padding: 12px; background: #FF6B35; color: white; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; opacity: ${currentTier === 'VIP' ? '0.6' : '1'};" ${currentTier === 'VIP' ? 'disabled' : ''}>
                        ${currentTier === 'VIP' ? '✓ Already Purchased' : 'Upgrade to VIP >'}
                    </button>
                </div>
                
                <div style="padding: 16px 20px 30px;">
                    <button id="closeUpgradeSheet" style="width: 100%; padding: 14px; background: #f0f2f5; border: none; border-radius: 30px; font-size: 15px; font-weight: 600; color: #666; cursor: pointer;">Close</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        
        document.getElementById('closeUpgradeSheet')?.addEventListener('click', () => {
            overlay.remove();
            document.body.style.overflow = '';
        });
        
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.remove();
                document.body.style.overflow = '';
            }
        });
        
        overlay.querySelectorAll('.plan-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (btn.disabled) return;
                const plan = btn.getAttribute('data-plan');
                const tier = btn.getAttribute('data-tier');
                localStorage.setItem('selected_plan', JSON.stringify({
                    plan: plan,
                    tier: tier,
                    price: plan === 'basic' ? 30000 : (plan === 'premium' ? 50000 : 100000)
                }));
                window.location.href = 'plan.html';
            });
        });
    }
    
    // Format amount input
    amountInput.addEventListener('input', function(e) {
        let val = this.value.replace(/[^0-9]/g, '');
        if (val === '') val = '0';
        let num = parseInt(val);
        this.value = num.toLocaleString('en-US');
        currentAmount = num;
        validateAmount();
    });
    
    // Quick amount buttons
    document.querySelectorAll('.quick-amount-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const amount = parseInt(btn.getAttribute('data-amount'));
            amountInput.value = amount.toLocaleString('en-US');
            currentAmount = amount;
            validateAmount();
        });
    });
    
    // Tag buttons - NOT auto active, just set text when clicked
    purchaseTag.addEventListener('click', () => {
        if (purchaseTag.classList.contains('active')) {
            purchaseTag.classList.remove('active');
            if (remarkInput.value === 'Purchase payment') {
                remarkInput.value = '';
            }
            selectedTag = null;
        } else {
            purchaseTag.classList.add('active');
            personalTag.classList.remove('active');
            remarkInput.value = 'Purchase payment';
            selectedTag = 'Purchase';
        }
    });
    
    personalTag.addEventListener('click', () => {
        if (personalTag.classList.contains('active')) {
            personalTag.classList.remove('active');
            if (remarkInput.value === 'Personal transfer') {
                remarkInput.value = '';
            }
            selectedTag = null;
        } else {
            personalTag.classList.add('active');
            purchaseTag.classList.remove('active');
            remarkInput.value = 'Personal transfer';
            selectedTag = 'Personal';
        }
    });
    
    // Validate amount - only check balance and minimum
    function validateAmount() {
        if (currentAmount < 10) {
            confirmBtn.disabled = true;
            return false;
        }
        
        if (currentAmount > userBalance) {
            confirmBtn.disabled = true;
            return false;
        }
        
        confirmBtn.disabled = false;
        return true;
    }
    
    // Process transaction
    async function processTransaction() {
        if (!validateAmount()) return;
        
        confirmBtn.disabled = true;
        confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        
        const transactionRef = '26' + Date.now().toString().slice(0, 10) + Math.random().toString(36).substring(2, 15).toUpperCase().slice(0, 10);
        const note = remarkInput.value.trim();
        const finalNote = note ? note : (selectedTag === 'Purchase' ? 'Purchase payment' : (selectedTag === 'Personal' ? 'Personal transfer' : 'Transfer'));
        
        const transactionData = {
            type: 'debit',
            title: `Transfer to ${recipient.name}`,
            amount: currentAmount,
            date: new Date().toLocaleString('en-US', { month: 'long', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' }),
            status: 'success',
            category: 'Transfer to',
            ref: transactionRef,
            paymentMethod: 'OWealth',
            fromTo: recipient.name,
            bank: 'OPay',
            accountNumber: recipient.accountNumber,
            note: finalNote,
            tag: selectedTag,
            dateObj: new Date()
        };
        
        try {
            const balanceResponse = await fetch(`${BACKEND_URL}/api/update-balance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: currentUser.email, 
                    amount: currentAmount,
                    operation: 'deduct'
                })
            });
            
            const balanceData = await balanceResponse.json();
            
            if (balanceData.success) {
                updateTransferCount();
                
                let recents = JSON.parse(localStorage.getItem('opayRecents') || '[]');
                recents = recents.filter(r => r.account !== recipient.accountNumber);
                recents.unshift({ name: recipient.name, account: recipient.accountNumber });
                recents = recents.slice(0, 10);
                localStorage.setItem('opayRecents', JSON.stringify(recents));
                
                let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
                transactions.unshift(transactionData);
                localStorage.setItem('transactions', JSON.stringify(transactions));
                
                localStorage.setItem('transactionData', JSON.stringify(transactionData));
                
                showMessage(`✓ Transfer successful! ₦${currentAmount.toLocaleString()} sent to ${recipient.name}`, 'success');
                
                setTimeout(() => {
                    window.location.href = 'receipt.html?data=' + encodeURIComponent(JSON.stringify(transactionData));
                }, 1500);
            } else {
                throw new Error(balanceData.message || 'Transaction failed');
            }
        } catch (error) {
            console.error('Transaction error:', error);
            showMessage(`Transfer failed: ${error.message || 'Something went wrong'}`, 'error');
            confirmBtn.disabled = false;
            confirmBtn.innerHTML = 'Confirm';
        }
    }
    
    // Confirm button click
    confirmBtn.addEventListener('click', async () => {
        if (currentAmount < 10) {
            showMessage('Minimum amount is ₦10.00', 'error');
            return;
        }
        
        if (currentAmount > userBalance) {
            showMessage(`Insufficient balance! Your available balance is ₦${userBalance.toLocaleString()}`, 'error');
            return;
        }
        
        const dailyCheck = await checkDailyTransferLimit();
        if (!dailyCheck.allowed) {
            showMessage(`Daily limit reached! You can only send ${dailyCheck.limit} times per day. Upgrade your plan for unlimited transfers.`, 'error');
            return;
        }
        
        const confirmResult = await Swal.fire({
            title: 'Confirm Transfer',
            html: `
                <div style="text-align: left;">
                    <p><strong>To:</strong> ${recipient.name}</p>
                    <p><strong>Amount:</strong> ₦${currentAmount.toLocaleString()}</p>
                    <p><strong>Note:</strong> ${remarkInput.value.trim() || 'No note'}</p>
                    <p><strong>Fee:</strong> ₦0.00</p>
                    <p><strong>Total:</strong> ₦${currentAmount.toLocaleString()}</p>
                    <p><strong>Today's transfers:</strong> ${todaysTransferCount} / ${dailyCheck.limit === 'unlimited' ? '∞' : dailyCheck.limit}</p>
                </div>
            `,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#00B875',
            cancelButtonColor: '#dc3545',
            confirmButtonText: 'Send Now',
            cancelButtonText: 'Cancel'
        });
        
        if (confirmResult.isConfirmed) {
            await processTransaction();
        }
    });
    
    // Initialize
    getCurrentUser();
    
    console.log('✅ Amount page loaded');
</script>
</body>
</html>
